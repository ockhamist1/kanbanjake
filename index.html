<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jake's Workspace</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root { 
            --bg: #f7f7f5; --text: #37352f; --sidebar: #ebebec; --border: #e0e0e0; 
            --card-bg: #ffffff; --accent: #4338ca; --nav-hover: rgba(0,0,0,0.05);
        }
        body.dark-mode { 
            --bg: #121212; --text: #e0e0e0; --sidebar: #1e1e1e; --border: #333; 
            --card-bg: #1e1e1e; --accent: #818cf8; --nav-hover: rgba(255,255,255,0.05);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100vh; background-color: var(--bg); color: var(--text); overflow: hidden; display: flex; transition: background 0.3s; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border); width: 320px; }
        
        #sidebar { width: 260px; background-color: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; flex-shrink: 0; }
        .sidebar-section-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 5px; }
        .nav-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; font-size: 14px; transition: 0.1s; display: block; border: none; background: none; width: 100%; text-align: left; color: inherit; }
        .nav-item:hover { background: var(--nav-hover); }
        .active-nav { background: var(--border) !important; font-weight: 600; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #kanban-view, #wiki-list-view, #wiki-content-view, #news-view, #drudge-view { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; width: 100%; box-sizing: border-box; }

        #sync-indicator { position: fixed; top: 15px; right: 15px; width: 10px; height: 10px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 8px #22c55e; opacity: 0; transition: 0.3s; z-index: 6000; }
        #sync-indicator.syncing { opacity: 1; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 20px; }
        .news-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .news-card.read { opacity: 0.4; filter: grayscale(1); order: 1; }
        .news-title { font-size: 14px; font-weight: 700; line-height: 1.4; color: var(--text); margin-bottom: 12px; }
        .news-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 10px; margin-top: auto; }
        .read-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: #888; cursor: pointer; }

        .column { min-width: 300px; display: flex; flex-direction: column; margin-right: 20px; }
        .card-list { min-height: 300px; padding-bottom: 100px; }
        .card { background: var(--card-bg); padding: 16px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; cursor: pointer; }

        #mobile-switcher { display: none; position: fixed; bottom: 0; width: 100%; background: var(--sidebar); border-top: 1px solid var(--border); height: 65px; z-index: 2000; justify-content: space-around; align-items: center; }
        .switch-btn { background: none; border: none; color: var(--text); cursor: pointer; text-align: center; font-size: 14px; padding: 10px; opacity: 0.6; flex: 1; }
        .switch-btn.active { opacity: 1; color: var(--accent); font-weight: bold; }

        @media (max-width: 768px) { #sidebar { display: none; } #mobile-switcher { display: flex; } #main-content { padding-bottom: 70px; } #kanban-board { flex-direction: column; } .column { width: 100%; margin-right: 0; margin-bottom: 30px; } }
    </style>
</head>
<body class="light-mode">

    <div id="sync-indicator"></div>

    <div id="login-screen">
        <div class="login-box">
            <h2>Jake's Workspace</h2>
            <button id="login-btn" style="background:var(--accent); color:white; padding: 12px 24px; border:none; border-radius:6px; cursor:pointer;">Sign in with Google</button>
        </div>
    </div>

    <div id="mobile-switcher">
        <button id="switch-tasks" class="switch-btn active">📊<br>BOARD</button>
        <button id="switch-news" class="switch-btn">📰<br>AP</button>
        <button id="switch-drudge" class="switch-btn">🚨<br>DRUDGE</button>
        <button id="switch-wiki" class="switch-btn">📄<br>WIKI</button>
    </div>

    <div id="app-container" style="display:none; width: 100%;">
        <div id="sidebar">
            <div class="sidebar-section-label">Main</div>
            <button id="nav-kanban" class="nav-item active-nav">📊 Kanban Board</button>
            <button id="nav-news" class="nav-item">📰 AP News Feed</button>
            <button id="nav-drudge" class="nav-item">🚨 Drudge Report</button>
            <div class="sidebar-section-label">Wiki Library</div>
            <div id="sidebar-wiki-list" style="flex-grow: 1; overflow-y: auto;"></div>
            <button id="add-wiki-btn" style="background:none; border:1px dashed #888; color:#888; width:100%; padding:8px; cursor:pointer; margin-top:10px;">+ New Page</button>
            <div style="margin-top: 20px; display: flex; gap: 8px;">
                <button id="theme-toggle" style="flex: 1; padding:8px; cursor:pointer;">🌙 Mode</button>
                <button id="logout-btn" style="flex: 1; padding:8px; cursor:pointer;">🚪 Out</button>
            </div>
        </div>

        <div id="main-content">
            <div id="kanban-view">
                <div id="kanban-board" style="display:flex;">
                    <div class="column" data-status="todo"><div class="column-header" style="font-weight:700; padding-bottom:15px; display:flex; justify-content:space-between;">To Do <button id="add-btn" style="background:var(--accent); color:white; border:none; border-radius:4px; cursor:pointer; padding:2px 8px;">+</button></div><div id="todo-list" class="card-list"></div></div>
                    <div class="column" data-status="doing"><div class="column-header" style="font-weight:700; padding-bottom:15px;">Doing</div><div id="doing-list" class="card-list"></div></div>
                    <div class="column" data-status="done"><div class="column-header" style="font-weight:700; padding-bottom:15px;">Done</div><div id="done-list" class="card-list"></div></div>
                </div>
            </div>

            <div id="news-view" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center;"><h2>AP News</h2><button onclick="fetchAP()" style="padding:8px; cursor:pointer;">🔄 Sync</button></div>
                <div id="news-container" class="news-grid"></div>
            </div>

            <div id="drudge-view" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center;"><h2>🚨 Drudge Report</h2><button onclick="fetchDrudge()" style="padding:8px; cursor:pointer;">🔄 Sync</button></div>
                <div id="drudge-container" class="news-grid"></div>
            </div>

            <div id="wiki-list-view" style="display:none;"><div id="mobile-wiki-list"></div></div>

            <div id="wiki-content-view" style="display: none;">
                <div class="wiki-header" style="border-bottom:1px solid var(--border); padding-bottom:20px; margin-bottom:10px;">
                    <input type="text" id="wiki-title-display" style="font-size:24px; font-weight:800; border:none; background:transparent; width:100%; color:inherit;">
                    <div style="margin-top:10px; display:flex; gap:10px;">
                        <button id="wiki-mode-preview" class="active" style="padding:6px 12px; cursor:pointer;">Preview</button>
                        <button id="wiki-mode-edit" style="padding:6px 12px; cursor:pointer;">Edit</button>
                        <button id="back-to-wiki" style="padding:6px 12px; cursor:pointer;">List</button>
                    </div>
                </div>
                <textarea id="wiki-notes" style="display:none; width:100%; height:500px; background:transparent; color:inherit; border:1px solid var(--border); padding:10px;"></textarea>
                <div id="wiki-preview"></div>
            </div>
        </div>
    </div>

    <div id="editor-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:4000; justify-content:center; align-items:center; backdrop-filter:blur(2px);">
        <div class="modal-content" style="background:var(--card-bg); width:95%; max-width:750px; padding:20px; border-radius:12px; position:relative; max-height: 90vh; overflow-y: auto;">
            <button id="close-modal" style="position:absolute; top:20px; right:20px; background:none; border:none; font-size:24px; cursor:pointer; color:#888;">&times;</button>
            <input type="text" id="modal-title-display" style="font-size:22px; font-weight:800; border:none; background:transparent; outline:none; color:inherit; width:90%;">
            <div style="margin:15px 0; display:flex; gap:10px;"><button id="task-mode-preview" class="active" style="padding:6px 12px; cursor:pointer;">Preview</button><button id="task-mode-edit" style="padding:6px 12px; cursor:pointer;">Edit</button></div>
            <textarea id="modal-notes" style="display:none; width:100%; min-height:300px; padding:15px; background:transparent; border:1px solid var(--border); color:inherit;"></textarea>
            <div id="modal-preview"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBrD9wri02pLZARr8BI600KTCbuIBTH1MI", authDomain: "kanbanjake.firebaseapp.com", projectId: "kanbanjake", storageBucket: "kanbanjake.firebasestorage.app", messagingSenderId: "207756213915", appId: "1:207756213915:web:2f546c9a9c7d28b189103e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let curTaskId = null, curWikiId = null, allTasks = [], isEditing = false, sortables = [], userReadList = [];

        const applyTheme = (t) => { document.body.classList.toggle('dark-mode', t === 'dark'); localStorage.setItem('theme', t); };
        applyTheme(localStorage.getItem('theme') || 'light');
        document.getElementById('theme-toggle').onclick = () => applyTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark');

        const showSync = (active) => document.getElementById('sync-indicator').classList.toggle('syncing', active);

        onAuthStateChanged(auth, async (u) => {
            if(u) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                const ud = await getDoc(doc(db, 'users', u.uid));
                userReadList = ud.exists() ? ud.data().readArticles || [] : [];
                fetchAP(); fetchDrudge();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        async function toggleRead(link, read, card) {
            if (read) { if (!userReadList.includes(link)) userReadList.push(link); card.classList.add('read'); card.style.order = "1"; }
            else { userReadList = userReadList.filter(l => l !== link); card.classList.remove('read'); card.style.order = "0"; }
            if(auth.currentUser) await setDoc(doc(db, 'users', auth.currentUser.uid), { readArticles: userReadList }, { merge: true });
        }

        window.fetchNews = async (cid, url, source) => {
            const container = document.getElementById(cid);
            container.innerHTML = '<p>Establishing uplink...</p>';
            try {
                const res = await fetch(`https://corsproxy.io/?${encodeURIComponent(url)}&cb=${Date.now()}`);
                const text = await res.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                const items = Array.from(xml.querySelectorAll("item, entry"));
                container.innerHTML = '';
                items.forEach((item, i) => {
                    if (i > 30) return;
                    const title = item.querySelector("title")?.textContent || "Breaking...";
                    const link = item.querySelector("link")?.textContent || item.querySelector("link")?.getAttribute("href") || "#";
                    const isRead = userReadList.includes(link);
                    const card = document.createElement('div');
                    card.className = `news-card ${isRead ? 'read' : ''}`;
                    card.style.order = isRead ? "1" : "0";
                    card.innerHTML = `<div class="news-title">${title}</div><div class="news-footer"><span>${source}</span><label class="read-toggle"><input type="checkbox" ${isRead ? 'checked' : ''}> Read</label></div>`;
                    card.onclick = () => { toggleRead(link, true, card); window.open(link, '_blank'); };
                    const cb = card.querySelector('input'); cb.onclick = (e) => { e.stopPropagation(); toggleRead(link, cb.checked, card); };
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = '<p>Interference detected.</p>'; }
        };

        window.fetchAP = () => fetchNews('news-container', 'https://news.google.com/rss/search?q=when:24h+AP+News&hl=en-US&gl=US&ceid=US:en', 'AP');
        window.fetchDrudge = () => fetchNews('drudge-container', 'https://drudgereportfeed.com/rss.xml', 'DRUDGE');

        function renderBoard() {
            if (isEditing) return;
            ['todo-list', 'doing-list', 'done-list'].forEach(id => {
                const list = document.getElementById(id); list.innerHTML = '';
                const status = id.split('-')[0];
                allTasks.forEach(d => {
                    if (d.data().status === status) {
                        const card = document.createElement('div'); card.className = 'card'; card.setAttribute('data-id', d.id); card.innerText = d.data().text;
                        card.onclick = () => { curTaskId = d.id; isEditing = true; document.getElementById('modal-title-display').value = d.data().text; document.getElementById('modal-notes').value = d.data().notes || ''; document.getElementById('task-mode-preview').click(); document.getElementById('editor-modal').style.display = 'flex'; };
                        list.appendChild(card);
                    }
                });
            });
            sortables.forEach(s => s.destroy());
            sortables = ['todo-list', 'doing-list', 'done-list'].map(id => new Sortable(document.getElementById(id), { group: 'kanban', onEnd: async (e) => {
                showSync(true); await updateDoc(doc(db, 'tasks', e.item.getAttribute('data-id')), { status: e.to.parentElement.getAttribute('data-status') }); showSync(false);
            }}));
        }

        onSnapshot(collection(db, "tasks"), (s) => { allTasks = s.docs; renderBoard(); });
        
        onSnapshot(collection(db, "wiki"), (s) => {
            const side = document.getElementById('sidebar-wiki-list'), mob = document.getElementById('mobile-wiki-list');
            side.innerHTML = ''; mob.innerHTML = '';
            s.docs.forEach(d => {
                const btn = document.createElement('button'); btn.className = 'nav-item'; btn.innerText = d.data().title;
                btn.onclick = () => { curWikiId = d.id; isEditing = false; document.getElementById('wiki-title-display').value = d.data().title; document.getElementById('wiki-notes').value = d.data().content || ''; document.getElementById('wiki-mode-preview').click(); showView(document.getElementById('wiki-content-view')); };
                side.appendChild(btn); mob.appendChild(btn.cloneNode(true));
                // Fix for cloned node listeners
                mob.lastChild.onclick = btn.onclick;
            });
        });

        const showView = (v) => {
            [document.getElementById('kanban-view'), document.getElementById('wiki-list-view'), document.getElementById('wiki-content-view'), document.getElementById('news-view'), document.getElementById('drudge-view')].forEach(d => d.style.display = 'none');
            v.style.display = 'flex';
            document.querySelectorAll('.switch-btn, .nav-item').forEach(b => b.classList.remove('active', 'active-nav'));
            const map = {'kanban-view':'switch-tasks', 'news-view':'switch-news', 'drudge-view':'switch-drudge', 'wiki-list-view':'switch-wiki', 'wiki-content-view':'switch-wiki'};
            if(map[v.id]) document.getElementById(map[v.id]).classList.add('active');
        };

        document.getElementById('switch-tasks').onclick = () => showView(document.getElementById('kanban-view'));
        document.getElementById('switch-news').onclick = () => showView(document.getElementById('news-view'));
        document.getElementById('switch-drudge').onclick = () => showView(document.getElementById('drudge-view'));
        document.getElementById('switch-wiki').onclick = () => showView(document.getElementById('wiki-list-view'));
        document.getElementById('nav-kanban').onclick = () => showView(document.getElementById('kanban-view'));
        document.getElementById('nav-news').onclick = () => showView(document.getElementById('news-view'));
        document.getElementById('nav-drudge').onclick = () => showView(document.getElementById('drudge-view'));

        const autoSaveTask = async () => { if(curTaskId) { showSync(true); await updateDoc(doc(db, 'tasks', curTaskId), { text: document.getElementById('modal-title-display').value, notes: document.getElementById('modal-notes').value }); showSync(false); }};
        document.getElementById('modal-notes').oninput = autoSaveTask;
        document.getElementById('modal-title-display').oninput = autoSaveTask;

        const autoSaveWiki = async () => { if(curWikiId) { showSync(true); await updateDoc(doc(db, 'wiki', curWikiId), { title: document.getElementById('wiki-title-display').value, content: document.getElementById('wiki-notes').value }); showSync(false); }};
        document.getElementById('wiki-notes').oninput = autoSaveWiki;
        document.getElementById('wiki-title-display').oninput = autoSaveWiki;

        document.getElementById('task-mode-preview').onclick = () => { isEditing = false; document.getElementById('modal-notes').style.display='none'; document.getElementById('modal-preview').style.display='block'; document.getElementById('modal-preview').innerHTML = marked.parse(document.getElementById('modal-notes').value); };
        document.getElementById('task-mode-edit').onclick = () => { isEditing = true; document.getElementById('modal-notes').style.display='block'; document.getElementById('modal-preview').style.display='none'; };
        document.getElementById('wiki-mode-preview').onclick = () => { isEditing = false; document.getElementById('wiki-notes').style.display='none'; document.getElementById('wiki-preview').style.display='block'; document.getElementById('wiki-preview').innerHTML = marked.parse(document.getElementById('wiki-notes').value); };
        document.getElementById('wiki-mode-edit').onclick = () => { isEditing = true; document.getElementById('wiki-notes').style.display='block'; document.getElementById('wiki-preview').style.display='none'; };
        document.getElementById('close-modal').onclick = () => { document.getElementById('editor-modal').style.display='none'; isEditing = false; };
        document.getElementById('add-btn').onclick = () => { const t = prompt("Task?"); if(t) addDoc(collection(db, "tasks"), { text: t, status: 'todo' }); };
        document.getElementById('add-wiki-btn').onclick = () => { const t = prompt("Title?"); if(t) addDoc(collection(db, "wiki"), { title: t, content: '' }); };
        document.getElementById('back-to-wiki').onclick = () => showView(document.getElementById('wiki-list-view'));
    </script>
</body>
</html>
