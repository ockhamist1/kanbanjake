<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jake's Kanban Wiki</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        /* --- DYNAMIC THEMING --- */
        :root { 
            --bg: #f7f7f5; --text: #37352f; --sidebar: #ebebec; --border: #e0e0e0; 
            --card-bg: #ffffff; --accent: #37352f; --nav-hover: rgba(0,0,0,0.05);
        }
        body.dark-mode { 
            --bg: #121212; --text: #e0e0e0; --sidebar: #1e1e1e; --border: #333; 
            --card-bg: #1e1e1e; --accent: #5c5c5c; --nav-hover: rgba(255,255,255,0.05);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100vh; background-color: var(--bg); color: var(--text); overflow: hidden; display: flex; transition: background 0.3s; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border); }
        
        /* --- SIDEBAR DRAWER --- */
        #sidebar { width: 260px; background-color: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; transition: transform 0.3s ease; z-index: 2000; box-sizing: border-box; }
        #mobile-header { display: none; background: var(--sidebar); padding: 12px 15px; border-bottom: 1px solid var(--border); align-items: center; justify-content: space-between; position: fixed; top: 0; width: 100%; z-index: 1500; }
        
        .sidebar-section-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 25px 0 10px 5px; }
        .nav-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; font-size: 14px; transition: 0.2s; }
        .nav-item:hover { background: var(--nav-hover); }
        .active-nav { background: var(--border) !important; font-weight: 600; }

        /* --- CONTENT AREAS --- */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; padding-top: 0; }
        #kanban-view, #wiki-view { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }

        /* --- KANBAN BOARD --- */
        #kanban-board { display: flex; gap: 20px; flex-grow: 1; }
        .column { min-width: 300px; width: 300px; display: flex; flex-direction: column; height: 100%; }
        .column-header { font-weight: 700; padding-bottom: 15px; display: flex; justify-content: space-between; font-size: 15px; }
        .card-list { flex-grow: 1; padding: 5px; min-height: 150px; }
        
        .card { background: var(--card-bg); padding: 16px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; cursor: grab; position: relative; touch-action: none; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .handle { color: #ccc; margin-right: 10px; cursor: grab; font-size: 18px; }
        
        .sortable-fallback { opacity: 1 !important; transform: rotate(1deg) scale(1.02); background: var(--card-bg) !important; box-shadow: 0 15px 35px rgba(0,0,0,0.2) !important; border: 1px solid var(--border); }

        /* --- WIKI & MODALS --- */
        #editor-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 700px; height: 85vh; border-radius: 12px; padding: 30px; display: flex; flex-direction: column; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        .title-input { font-size: 26px; font-weight: 800; border: none; background: transparent; width: 100%; outline: none; color: inherit; margin-bottom: 10px; }
        .textarea { flex-grow: 1; width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: inherit; font-size: 16px; margin-top: 15px; background: rgba(0,0,0,0.02); color: inherit; resize: none; outline: none; }
        
        .btn { padding: 10px 20px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .btn-save { background: var(--text); color: var(--bg); }
        .btn-delete { color: #ff4d4f; background: transparent; border: 1px solid #ff4d4f; }
        .btn-delete:hover { background: #ff4d4f; color: white; }

        /* --- MOBILE RE-DESIGN --- */
        @media (max-width: 768px) {
            #sidebar { position: fixed; left: 0; transform: translateX(-100%); height: 100vh; box-shadow: 10px 0 30px rgba(0,0,0,0.1); width: 280px; }
            #sidebar.open { transform: translateX(0); }
            #mobile-header { display: flex; }
            #main-content { padding-top: 55px; }
            #kanban-board { overflow-x: auto; scroll-snap-type: x mandatory; padding: 10px; gap: 15px; }
            .column { min-width: 88vw; scroll-snap-align: center; }
            #kanban-view, #wiki-view { padding: 20px; }
            .modal-content { height: 92vh; padding: 20px; }
            .title-input { font-size: 20px; }
        }
    </style>
</head>
<body class="light-mode"> <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-top:0">Jake's Kanban Wiki</h2>
            <button id="login-btn" class="btn btn-save">Sign in with Google</button>
        </div>
    </div>

    <div id="mobile-header">
        <button id="menu-toggle" style="background:none; border:none; font-size: 24px; color: var(--text);">☰</button>
        <span style="font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Workspace</span>
        <div style="width: 24px;"></div>
    </div>

    <div id="app-container">
        <div id="sidebar">
            <input type="text" id="global-search" placeholder="Search everything..." style="background: var(--bg); border: 1px solid var(--border); padding: 10px; border-radius: 8px; color: inherit; outline: none;">
            
            <div class="sidebar-section-label">Main</div>
            <div id="nav-kanban" class="nav-item active-nav">📊 Kanban Board</div>
            
            <div class="sidebar-section-label">History</div>
            <div id="history-list"></div>

            <div class="sidebar-section-label">All Pages</div>
            <div id="wiki-list" style="flex-grow: 1; overflow-y: auto;"></div>
            
            <button id="add-wiki-btn" class="btn" style="background:none; border: 1px dashed #888; color: #888; width: 100%; margin-top: 10px;">+ New Page</button>
            
            <div style="margin-top: 20px; display: flex; gap: 8px;">
                <button id="theme-toggle" class="btn" style="flex: 1; background: var(--border); color: var(--text);">🌙 Theme</button>
                <button id="logout-btn" class="btn" style="flex: 1; background: var(--border); color: var(--text);">🚪 Out</button>
            </div>
        </div>

        <div id="main-content">
            <div id="kanban-view">
                <h1 style="margin-top:0; font-size: 22px;">Tasks</h1>
                <div id="kanban-board">
                    <div class="column" data-status="todo">
                        <div class="column-header">To Do <button id="add-btn" class="btn btn-save" style="padding: 2px 10px; font-size: 12px;">+ Add</button></div>
                        <div class="card-list" id="todo-list"></div>
                    </div>
                    <div class="column" data-status="doing">
                        <div class="column-header">In Progress</div>
                        <div class="card-list" id="doing-list"></div>
                    </div>
                    <div class="column" data-status="done">
                        <div class="column-header">Done</div>
                        <div class="card-list" id="done-list"></div>
                    </div>
                </div>
            </div>

            <div id="wiki-view" style="display: none;">
                <input type="text" id="wiki-title-display" class="title-input" placeholder="Page Title">
                <textarea id="wiki-notes" class="textarea" placeholder="Start your deep dive here..."></textarea>
                <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
                    <button id="delete-wiki-btn" class="btn btn-delete">Delete Page</button>
                    <button id="wiki-save-btn" class="btn btn-save">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editor-modal">
        <div class="modal-content">
            <button id="close-modal" style="background: none; border: none; font-size: 28px; color: #888; cursor: pointer;">&times;</button>
            <input type="text" id="modal-title-display" class="title-input">
            <textarea id="modal-notes" class="textarea"></textarea>
            <div style="margin-top: 25px; display: flex; justify-content: space-between; align-items: center;">
                <button id="delete-task-btn" class="btn btn-delete">Delete Task</button>
                <button id="save-notes" class="btn btn-save">Save Task</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, deleteDoc, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrD9wri02pLZARr8BI600KTCbuIBTH1MI",
            authDomain: "kanbanjake.firebaseapp.com",
            projectId: "kanbanjake",
            storageBucket: "kanbanjake.firebasestorage.app",
            messagingSenderId: "207756213915",
            appId: "1:207756213915:web:2f546c9a9c7d28b189103e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const tasksCol = collection(db, "tasks");
        const wikiCol = collection(db, "wiki");

        // --- DARK MODE PERSISTENCE ---
        const themeToggle = document.getElementById('theme-toggle');
        const applyTheme = (theme) => {
            if (theme === 'dark') document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
        };
        const savedTheme = localStorage.getItem('theme') || 'light';
        applyTheme(savedTheme);

        themeToggle.onclick = () => {
            const newTheme = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
            applyTheme(newTheme);
            localStorage.setItem('theme', newTheme);
        };

        // --- AUTH & STATE ---
        let curTaskId = null, curWikiId = null;
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                startApp();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // --- SIDEBAR AUTO-CLOSE ---
        const sidebar = document.getElementById('sidebar');
        const closeSidebar = () => { if(window.innerWidth <= 768) sidebar.classList.remove('open'); };
        document.getElementById('menu-toggle').onclick = () => sidebar.classList.toggle('open');

        function startApp() {
            // DRAG AND DROP
            ['todo-list', 'doing-list', 'done-list'].forEach(id => {
                new Sortable(document.getElementById(id), {
                    group: 'kanban', animation: 150, delay: 300, delayOnTouchOnly: true,
                    forceFallback: true, fallbackOnBody: true,
                    onStart: () => document.body.style.overflow = 'hidden',
                    onEnd: (evt) => {
                        document.body.style.overflow = 'auto';
                        const newStatus = evt.to.parentElement.getAttribute('data-status');
                        const taskId = evt.item.getAttribute('data-id');
                        if (taskId && newStatus) updateDoc(doc(db, 'tasks', taskId), { status: newStatus });
                    }
                });
            });

            // LISTENERS
            onSnapshot(tasksCol, (snap) => {
                ['todo-list', 'doing-list', 'done-list'].forEach(id => document.getElementById(id).innerHTML = '');
                snap.forEach(d => {
                    const t = d.data();
                    const card = document.createElement('div');
                    card.className = 'card'; card.setAttribute('data-id', d.id);
                    card.innerHTML = `<span class="handle">⠿</span> ${t.text}`;
                    card.onclick = (e) => { if(e.target.className !== 'handle') openTask(d.id, t); };
                    document.getElementById(`${t.status}-list`).appendChild(card);
                });
            });

            // HISTORY TAB LISTENER (Last 4 modified)
            const historyQuery = query(wikiCol, orderBy("lastModified", "desc"), limit(4));
            onSnapshot(historyQuery, (snap) => {
                const list = document.getElementById('history-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const p = d.data();
                    if(!p.lastModified) return;
                    const item = document.createElement('div');
                    item.className = 'nav-item'; item.innerHTML = `<span style="font-size:10px">🕒</span> ${p.title}`;
                    item.onclick = () => openWiki(d.id, p);
                    list.appendChild(item);
                });
            });

            // ALL PAGES LISTENER
            const allPagesQuery = query(wikiCol, orderBy("title", "asc"));
            onSnapshot(allPagesQuery, (snap) => {
                const list = document.getElementById('wiki-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const p = d.data();
                    const item = document.createElement('div');
                    item.className = 'nav-item'; item.innerText = `📄 ${p.title}`;
                    item.onclick = () => openWiki(d.id, p);
                    list.appendChild(item);
                });
            });
        }

        function openTask(id, t) {
            curTaskId = id;
            document.getElementById('modal-title-display').value = t.text;
            document.getElementById('modal-notes').value = t.notes || '';
            document.getElementById('editor-modal').style.display = 'flex';
        }

        function openWiki(id, p) {
            curWikiId = id;
            document.getElementById('kanban-view').style.display = 'none';
            document.getElementById('wiki-view').style.display = 'flex';
            document.getElementById('wiki-title-display').value = p.title;
            document.getElementById('wiki-notes').value = p.content || '';
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            closeSidebar();
        }

        document.getElementById('nav-kanban').onclick = () => {
            document.getElementById('kanban-view').style.display = 'flex';
            document.getElementById('wiki-view').style.display = 'none';
            closeSidebar();
        };

        // SAVE & DELETE
        document.getElementById('save-notes').onclick = () => {
            updateDoc(doc(db, 'tasks', curTaskId), { 
                text: document.getElementById('modal-title-display').value,
                notes: document.getElementById('modal-notes').value 
            });
            document.getElementById('editor-modal').style.display = 'none';
        };

        document.getElementById('wiki-save-btn').onclick = async () => {
            await updateDoc(doc(db, 'wiki', curWikiId), { 
                title: document.getElementById('wiki-title-display').value,
                content: document.getElementById('wiki-notes').value,
                lastModified: serverTimestamp() // Triggers the History Tab
            });
            alert("Saved!");
        };

        document.getElementById('add-btn').onclick = () => {
            const t = prompt("Task Name?");
            if(t) addDoc(tasksCol, { text: t, status: 'todo', tag: 'General', notes: '' });
        };

        document.getElementById('add-wiki-btn').onclick = () => {
            const t = prompt("Page Title?");
            if(t) addDoc(wikiCol, { title: t, content: '', lastModified: serverTimestamp() });
        };

        document.getElementById('delete-task-btn').onclick = () => {
            if(confirm("Delete?")) { deleteDoc(doc(db, 'tasks', curTaskId)); document.getElementById('editor-modal').style.display = 'none'; }
        };

        document.getElementById('delete-wiki-btn').onclick = () => {
            if(confirm("Delete?")) { deleteDoc(doc(db, 'wiki', curWikiId)); document.getElementById('nav-kanban').click(); }
        };

        document.getElementById('close-modal').onclick = () => document.getElementById('editor-modal').style.display = 'none';
    </script>
</body>
</html>
