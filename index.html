<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jake's Workspace</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root { 
            --bg: #f7f7f5; --text: #37352f; --sidebar: #ebebec; --border: #e0e0e0; 
            --card-bg: #ffffff; --accent: #4338ca; --nav-hover: rgba(0,0,0,0.05);
        }
        body.dark-mode { 
            --bg: #121212; --text: #e0e0e0; --sidebar: #1e1e1e; --border: #333; 
            --card-bg: #1e1e1e; --accent: #818cf8; --nav-hover: rgba(255,255,255,0.05);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100vh; background-color: var(--bg); color: var(--text); overflow: hidden; display: flex; transition: background 0.3s; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border); width: 320px; }
        
        #sidebar { width: 260px; background-color: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; flex-shrink: 0; }
        .sidebar-section-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 5px; }
        .nav-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; font-size: 14px; transition: 0.1s; }
        .nav-item:hover { background: var(--nav-hover); }
        .active-nav { background: var(--border) !important; font-weight: 600; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #kanban-view, #wiki-content-view, #news-view, #drudge-view { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; width: 100%; box-sizing: border-box; }

        /* --- TRIAGE NEWS GRID --- */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-top: 20px; }
        .news-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .news-card:hover { border-color: var(--accent); background: var(--nav-hover); }
        .news-card.read { opacity: 0.4; filter: grayscale(1); order: 1; }
        .news-title { font-size: 14px; font-weight: 700; line-height: 1.4; color: var(--text); margin-bottom: 12px; }
        .news-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 10px; margin-top: auto; }
        .news-meta { font-size: 10px; font-weight: 600; text-transform: uppercase; color: #888; }
        
        .read-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: #888; cursor: pointer; }
        .read-toggle input { cursor: pointer; width: 18px; height: 18px; margin: 0; }

        /* --- MOBILE SWITCHER --- */
        #mobile-switcher { display: none; position: fixed; bottom: 0; width: 100%; background: var(--sidebar); border-top: 1px solid var(--border); height: 65px; z-index: 2000; justify-content: space-around; align-items: center; }
        .switch-btn { background: none; border: none; color: var(--text); cursor: pointer; text-align: center; font-size: 16px; padding: 10px; opacity: 0.6; flex: 1; }
        .switch-btn.active { opacity: 1; color: var(--accent); font-weight: bold; }

        /* --- KANBAN --- */
        .column { min-width: 300px; display: flex; flex-direction: column; margin-right: 20px; }
        .card-list { min-height: 300px; padding-bottom: 100px; }
        .card { background: var(--card-bg); padding: 16px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; cursor: grab; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        .toolbar { display: flex; gap: 4px; background: var(--bg); padding: 5px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 10px; flex-wrap: wrap; }
        .toolbar-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--text); }

        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-toggle { background: var(--sidebar); color: var(--text); border: 1px solid var(--border); }
        .btn-toggle.active { background: var(--accent); color: white; border-color: var(--accent); }

        @media (max-width: 768px) { 
            #sidebar { display: none; } 
            #mobile-switcher { display: flex; } 
            #main-content { padding-bottom: 70px; }
            #kanban-board { flex-direction: column; }
            .column { width: 100%; margin-right: 0; margin-bottom: 30px; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Jake's Workspace</h2>
            <button id="login-btn" class="btn" style="background:var(--accent); color:white; padding: 12px 24px; width: 100%;">Sign in with Google</button>
        </div>
    </div>

    <div id="mobile-switcher">
        <button id="switch-tasks" class="switch-btn active">📊<br><small>BOARD</small></button>
        <button id="switch-news" class="switch-btn">📰<br><small>AP</small></button>
        <button id="switch-drudge" class="switch-btn">🚨<br><small>DRUDGE</small></button>
        <button id="switch-wiki" class="switch-btn">📄<br><small>WIKI</small></button>
    </div>

    <div id="app-container" style="display:none; width: 100%;">
        <div id="sidebar">
            <div class="sidebar-section-label">Main</div>
            <div id="nav-kanban" class="nav-item active-nav">📊 Kanban Board</div>
            <div id="nav-news-sidebar" class="nav-item">📰 AP News Feed</div>
            <div id="nav-drudge-sidebar" class="nav-item">🚨 Drudge Report</div>
            <div class="sidebar-section-label">Wiki Library</div>
            <div id="wiki-nav-list" style="flex-grow: 1; overflow-y: auto;"></div>
            <button id="add-wiki-btn" class="btn" style="background:none; border: 1px dashed #888; color:#888; width:100%; margin-top:10px;">+ New Page</button>
            <div style="margin-top: 20px; display: flex; gap: 8px;">
                <button id="theme-toggle" class="btn" style="flex: 1; background: var(--border); color:var(--text);">🌙 Mode</button>
                <button id="logout-btn" class="btn" style="flex: 1; background: var(--border); color:var(--text);">🚪 Out</button>
            </div>
        </div>

        <div id="main-content">
            <div id="kanban-view">
                <div id="kanban-board" style="display:flex;">
                    <div class="column" data-status="todo">
                        <div class="column-header" style="font-weight:700; padding-bottom:15px; display:flex; justify-content:space-between; align-items:center;">To Do <button id="add-btn" class="btn" style="background:var(--accent); color:white; padding:4px 12px;">+ Add</button></div>
                        <div id="todo-list" class="card-list"></div>
                    </div>
                    <div class="column" data-status="doing"><div class="column-header" style="font-weight:700; padding-bottom:15px;">Doing</div><div id="doing-list" class="card-list"></div></div>
                    <div class="column" data-status="done"><div class="column-header" style="font-weight:700; padding-bottom:15px; display:flex; justify-content:space-between;">Done <button id="bulk-archive-btn" style="background:none; border:none; cursor:pointer;">🧹</button></div><div id="done-list" class="card-list"></div></div>
                </div>
            </div>

            <div id="news-view" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="margin:0">AP News</h2>
                    <button id="re-sync-ap" class="btn btn-toggle">🔄 Re-Sync</button>
                </div>
                <div id="news-container" class="news-grid"></div>
            </div>

            <div id="drudge-view" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="margin:0">🚨 Drudge Report</h2>
                    <button id="re-sync-drudge" class="btn btn-toggle">🔄 Re-Sync</button>
                </div>
                <div id="drudge-container" class="news-grid"></div>
            </div>

            <div id="wiki-content-view" style="display: none;">
                <div class="wiki-header" style="border-bottom:1px solid var(--border); padding-bottom:20px; margin-bottom:10px;">
                    <input type="text" id="wiki-title-display" style="font-size:28px; font-weight:800; border:none; background:transparent; outline:none; color:inherit; width:100%;">
                    <div style="margin-top:10px; display:flex; gap:12px; align-items:center; flex-wrap:wrap;">
                        <button id="wiki-mode-preview" class="btn-toggle active">Preview</button>
                        <button id="wiki-mode-edit" class="btn-toggle">Edit</button>
                        <button id="wiki-export-pdf" class="btn-toggle">🖨️ PDF</button>
                    </div>
                </div>
                <div id="wiki-toolbar" class="toolbar" style="display:none;">
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '**', '**')">B</button>
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '*', '*')">I</button>
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '# ', '')">H1</button>
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '- ', '')">List</button>
                </div>
                <textarea id="wiki-notes" class="textarea" style="display:none; width:100%; min-height:500px; padding:15px; background:transparent; border:1px solid var(--border); color:inherit;"></textarea>
                <div id="wiki-preview" class="preview-area" style="overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <div id="editor-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:4000; justify-content:center; align-items:center; backdrop-filter:blur(2px);">
        <div class="modal-content" style="background:var(--card-bg); width:95%; max-width:750px; padding:20px; border-radius:12px; position:relative; max-height: 90vh; overflow-y: auto;">
            <button id="close-modal" style="position:absolute; top:20px; right:20px; background:none; border:none; font-size:24px; cursor:pointer; color:#888;">&times;</button>
            <input type="text" id="modal-title-display" style="font-size:22px; font-weight:800; border:none; background:transparent; outline:none; color:inherit; width:90%;">
            <div style="margin:15px 0; display:flex; gap:10px; flex-wrap:wrap;">
                <button id="task-mode-preview" class="btn-toggle active">Preview</button>
                <button id="task-mode-edit" class="btn-toggle">Edit</button>
            </div>
            <div id="task-toolbar" class="toolbar" style="display:none;">
                <button class="toolbar-btn" onclick="wrap('modal-notes', '**', '**')">B</button>
                <button class="toolbar-btn" onclick="wrap('modal-notes', '*', '*')">I</button>
                <button class="toolbar-btn" onclick="wrap('modal-notes', '- ', '')">List</button>
            </div>
            <textarea id="modal-notes" class="textarea" style="display:none; width:100%; min-height:300px; padding:15px; background:transparent; border:1px solid var(--border); color:inherit;"></textarea>
            <div id="modal-preview" class="preview-area"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBrD9wri02pLZARr8BI600KTCbuIBTH1MI", authDomain: "kanbanjake.firebaseapp.com", projectId: "kanbanjake", storageBucket: "kanbanjake.firebasestorage.app", messagingSenderId: "207756213915", appId: "1:207756213915:web:2f546c9a9c7d28b189103e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const tasksCol = collection(db, "tasks");
        const wikiCol = collection(db, "wiki");

        let curTaskId = null, curWikiId = null, allTasks = [], isEditing = false, sortables = [], userReadList = [];

        // --- AUTH & PERSISTENCE ---
        onAuthStateChanged(auth, async (u) => { 
            if(u) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                // Fetch Read List from Firestore
                const userDoc = await getDoc(doc(db, 'users', u.uid));
                userReadList = userDoc.exists() ? userDoc.data().readArticles || [] : [];
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });

        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // --- PERSISTENT TRIAGE LOGIC ---
        async function toggleRead(link, shouldRead, card) {
            const uid = auth.currentUser.uid;
            if (shouldRead) {
                if (!userReadList.includes(link)) userReadList.push(link);
                card.classList.add('read');
                card.style.order = "1";
            } else {
                userReadList = userReadList.filter(r => r !== link);
                card.classList.remove('read');
                card.style.order = "0";
            }
            await setDoc(doc(db, 'users', uid), { readArticles: userReadList }, { merge: true });
        }

        // --- NEWS ENGINE ---
        async function fetchNews(containerId, url, sourceName) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<p>Syncing ${sourceName} signal...</p>`;
            const proxies = [`https://corsproxy.io/?${encodeURIComponent(url)}`, `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` ];
            
            let data = null;
            for (let p of proxies) {
                try { const res = await fetch(`${p}&cb=${Date.now()}`); if(res.ok) { data = await res.text(); break; } } catch(e) {}
            }

            if (!data) { container.innerHTML = `<p style="color:red;">Signal Jammed. Try Re-Sync.</p>`; return; }

            const xml = new DOMParser().parseFromString(data, "text/xml");
            let items = Array.from(xml.querySelectorAll("item, entry"));
            
            items.sort((a,b) => {
                const linkA = a.querySelector("link")?.textContent || a.querySelector("link")?.getAttribute("href") || "";
                return userReadList.includes(linkA) ? 1 : -1;
            });

            container.innerHTML = '';
            items.forEach((item, i) => {
                if (i > 24) return;
                const title = item.querySelector("title")?.textContent || "Breaking...";
                const link = item.querySelector("link")?.textContent || item.querySelector("link")?.getAttribute("href") || "#";
                const isRead = userReadList.includes(link);

                const card = document.createElement('div');
                card.className = `news-card ${isRead ? 'read' : ''}`;
                card.style.order = isRead ? "1" : "0";
                card.innerHTML = `<div class="news-title">${title}</div><div class="news-footer"><div class="news-meta">${sourceName}</div><label class="read-toggle"><input type="checkbox" ${isRead ? 'checked' : ''}> Mark Read</label></div>`;
                
                card.onclick = () => { toggleRead(link, true, card); window.open(link, '_blank'); };
                const box = card.querySelector('input');
                box.onclick = (e) => { e.stopPropagation(); toggleRead(link, box.checked, card); };
                container.appendChild(card);
            });
        }

        const fetchAP = () => fetchNews('news-container', 'https://news.google.com/rss/search?q=when:24h+AP+News&hl=en-US&gl=US&ceid=US:en', 'AP');
        const fetchDrudge = () => fetchNews('drudge-container', 'https://drudgereportfeed.com/rss.xml', 'DRUDGE');

        // --- NAV & UI ---
        const showView = (v) => {
            [document.getElementById('kanban-view'), document.getElementById('wiki-content-view'), document.getElementById('news-view'), document.getElementById('drudge-view')].forEach(d => d.style.display = 'none');
            v.style.display = 'flex';
            if (v.id === 'news-view') fetchAP();
            if (v.id === 'drudge-view') fetchDrudge();
            // Sync Mobile Nav
            document.querySelectorAll('.switch-btn').forEach(b => b.classList.remove('active'));
            const map = {'kanban-view':'switch-tasks', 'news-view':'switch-news', 'drudge-view':'switch-drudge', 'wiki-content-view':'switch-wiki'};
            if(map[v.id]) document.getElementById(map[v.id]).classList.add('active');
        };

        document.getElementById('switch-tasks').onclick = () => showView(document.getElementById('kanban-view'));
        document.getElementById('switch-news').onclick = () => showView(document.getElementById('news-view'));
        document.getElementById('switch-drudge').onclick = () => showView(document.getElementById('drudge-view'));
        document.getElementById('switch-wiki').onclick = () => showView(document.getElementById('wiki-content-view'));
        document.getElementById('nav-kanban').onclick = () => showView(document.getElementById('kanban-view'));
        document.getElementById('nav-news-sidebar').onclick = () => showView(document.getElementById('news-view'));
        document.getElementById('nav-drudge-sidebar').onclick = () => showView(document.getElementById('drudge-view'));
        document.getElementById('re-sync-ap').onclick = fetchAP;
        document.getElementById('re-sync-drudge').onclick = fetchDrudge;

        // --- BOARD LOGIC ---
        function renderBoard() {
            if (isEditing) return;
            ['todo-list', 'doing-list', 'done-list'].forEach(id => {
                const list = document.getElementById(id); list.innerHTML = '';
                const status = id.split('-')[0];
                allTasks.forEach(d => {
                    const t = d.data();
                    if (t.status === status) {
                        const card = document.createElement('div'); card.className = 'card'; card.innerText = t.text;
                        card.onclick = () => { curTaskId = d.id; isEditing = true; document.getElementById('modal-title-display').value = t.text; document.getElementById('modal-notes').value = t.notes || ''; document.getElementById('task-mode-preview').click(); document.getElementById('editor-modal').style.display = 'flex'; };
                        list.appendChild(card);
                    }
                });
            });
            sortables.forEach(s => s.destroy());
            sortables = ['todo-list', 'doing-list', 'done-list'].map(id => new Sortable(document.getElementById(id), { group: 'kanban', onEnd: (e) => updateDoc(doc(db, 'tasks', e.item.getAttribute('data-id')), { status: e.to.parentElement.getAttribute('data-status') }) }));
        }

        onSnapshot(tasksCol, (s) => { allTasks = s.docs; renderBoard(); });
        onSnapshot(wikiCol, (s) => {
            const list = document.getElementById('wiki-nav-list'); list.innerHTML = '';
            s.docs.forEach(d => {
                const item = document.createElement('div'); item.className = 'nav-item'; item.innerText = `📄 ${d.data().title}`;
                item.onclick = () => { curWikiId = d.id; isEditing = false; showView(document.getElementById('wiki-content-view')); document.getElementById('wiki-title-display').value = d.data().title; document.getElementById('wiki-notes').value = d.data().content || ''; document.getElementById('wiki-mode-preview').click(); };
                list.appendChild(item);
            });
        });

        // --- TOOLS ---
        window.wrap = (id, pre, suf) => {
            const ta = document.getElementById(id); const s = ta.selectionStart, e = ta.selectionEnd, v = ta.value;
            ta.value = v.substring(0, s) + pre + v.substring(s, e) + suf + v.substring(e);
            ta.dispatchEvent(new Event('input'));
        };

        function setupToggle(p, n, pr, tb) {
            const bP = document.getElementById(`${p}-mode-preview`), bE = document.getElementById(`${p}-mode-edit`);
            bP.onclick = () => { isEditing = false; n.style.display='none'; pr.style.display='block'; if(tb) document.getElementById(tb).style.display='none'; bP.classList.add('active'); bE.classList.remove('active'); pr.innerHTML = marked.parse(n.value || ""); };
            bE.onclick = () => { isEditing = true; n.style.display='block'; pr.style.display='none'; if(tb) document.getElementById(tb).style.display='flex'; bE.classList.add('active'); bP.classList.remove('active'); };
        }
        setupToggle('task', document.getElementById('modal-notes'), document.getElementById('modal-preview'), 'task-toolbar');
        setupToggle('wiki', document.getElementById('wiki-notes'), document.getElementById('wiki-preview'), 'wiki-toolbar');

        document.getElementById('close-modal').onclick = () => { document.getElementById('editor-modal').style.display='none'; isEditing=false; };
        document.getElementById('add-btn').onclick = () => { const t = prompt("Task?"); if(t) addDoc(tasksCol, { text: t, status: 'todo' }); };
    </script>
</body>
</html>
