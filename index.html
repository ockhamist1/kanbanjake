<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jake's Workspace</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root { 
            --bg: #f7f7f5; --text: #37352f; --sidebar: #ebebec; --border: #e0e0e0; 
            --card-bg: #ffffff; --accent: #4338ca; --nav-hover: rgba(0,0,0,0.05);
            --m-badge: #dbeafe; --m-text: #1e40af; --c-badge: #dcfce7; --c-text: #166534;
            --s-badge: #fef9c3; --s-text: #854d0e; --u-badge: #fee2e2; --u-text: #991b1b;
        }
        [data-theme="dark"] { 
            --bg: #121212; --text: #e0e0e0; --sidebar: #1e1e1e; --border: #333; 
            --card-bg: #1e1e1e; --accent: #818cf8; --nav-hover: rgba(255,255,255,0.05);
            --m-badge: #1e3a8a; --m-text: #dbeafe; --c-badge: #064e3b; --c-text: #dcfce7;
            --s-badge: #713f12; --s-text: #fef9c3; --u-badge: #7f1d1d; --u-text: #fee2e2;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100vh; background-color: var(--bg); color: var(--text); display: flex; transition: background 0.3s; overflow: hidden; }
        
        /* --- SEARCH (Cmd+K) --- */
        #search-palette { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 2147483647; display: none; justify-content: center; padding-top: 100px; }
        .search-box { background: var(--card-bg); width: 90%; max-width: 600px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 30px 60px rgba(0,0,0,0.5); overflow: hidden; height: fit-content; }
        #search-input { width: 100%; padding: 20px; font-size: 18px; border: none; background: transparent; color: var(--text); outline: none; border-bottom: 1px solid var(--border); }
        .search-item { padding: 15px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin: 5px; color: var(--text); }
        .search-item:hover { background: var(--nav-hover); }

        /* --- CATEGORY COLORS --- */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        .badge-mortgage { background: var(--m-badge) !important; color: var(--m-text) !important; }
        .badge-church { background: var(--c-badge) !important; color: var(--c-text) !important; }
        .badge-sunday-school { background: var(--s-badge) !important; color: var(--s-text) !important; }
        .badge-urgent { background: var(--u-badge) !important; color: var(--u-text) !important; }

        #sidebar { width: 260px; background-color: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; flex-shrink: 0; }
        .nav-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; font-size: 14px; background: none; border: none; text-align: left; color: inherit; width: 100%; display: block; }
        .nav-item:hover, .nav-item.active { background: var(--nav-hover); font-weight: 600; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .view-pane { padding: 20px; flex-grow: 1; display: none; flex-direction: column; overflow-y: auto; box-sizing: border-box; }
        .card { background: var(--card-bg); padding: 16px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .card:hover { border-color: var(--accent); }

        #mobile-switcher { display: none; position: fixed; bottom: 0; width: 100%; background: var(--sidebar); border-top: 1px solid var(--border); height: 65px; z-index: 2000; justify-content: space-around; align-items: center; }
        @media (max-width: 768px) { #sidebar { display: none; } #mobile-switcher { display: flex; } #main-content { padding-bottom: 70px; } }
        
        .btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-weight: 600; font-size: 13px; background: var(--card-bg); color: var(--text); }
        .btn-active { background: var(--accent); color: white; border-color: var(--accent); }
    </style>
</head>
<body data-theme="light">
    <div id="search-palette">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Jump to anywhere..." autocomplete="off">
            <div id="search-results" style="max-height: 400px; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="login-screen" style="position:fixed; inset:0; background:var(--bg); display:flex; justify-content:center; align-items:center; z-index:99999;">
        <div style="background:var(--card-bg); padding:40px; border-radius:12px; border:1px solid var(--border); text-align:center; width:300px;">
            <h2>Jake's Workspace</h2>
            <button id="login-btn" style="background:var(--accent); color:white; border:none; padding:12px 24px; border-radius:6px; cursor:pointer; font-weight:700;">Sign in with Google</button>
        </div>
    </div>

    <div id="app-container" style="display:none; width: 100%; height: 100vh;">
        <div id="sidebar">
            <div style="font-size:11px; font-weight:800; color:#888; margin-bottom:10px;">WORKSPACE</div>
            <button class="nav-item active" data-view="kanban-view">📊 Board</button>
            <button class="nav-item" data-view="news-view">📰 News Feed</button>
            <button class="nav-item" data-view="freebies-view">🎁 Deals Feed</button>
            <div style="font-size:11px; font-weight:800; color:#888; margin:20px 0 10px 0;">WIKI</div>
            <div id="sidebar-wiki-list"></div>
            <button id="add-wiki-btn" class="nav-item" style="border:1px dashed #888; color:#888; text-align:center;">+ New Page</button>
            <div style="margin-top:auto; display:flex; gap:10px;">
                <button id="theme-toggle" class="nav-item" style="text-align:center; background:var(--border);">🌙 Mode</button>
                <button id="logout-btn" class="nav-item" style="text-align:center; background:var(--border);">🚪 Out</button>
            </div>
        </div>

        <div id="main-content">
            <div id="kanban-view" class="view-pane" style="display: flex;">
                <div style="display:flex; gap:20px; height: 100%; overflow-x: auto;">
                    <div class="column" style="flex:1; min-width:300px;"><div style="font-weight:700; padding-bottom:15px; display:flex; justify-content:space-between;">To Do <button id="add-btn">+</button></div><div id="todo-list" style="min-height: 50vh;"></div></div>
                    <div class="column" style="flex:1; min-width:300px;"><div style="font-weight:700; padding-bottom:15px;">Doing</div><div id="doing-list" style="min-height: 50vh;"></div></div>
                    <div class="column" style="flex:1; min-width:300px;"><div style="font-weight:700; padding-bottom:15px;">Done</div><div id="done-list" style="min-height: 50vh;"></div></div>
                </div>
            </div>

            <div id="news-view" class="view-pane">
                <div style="display:flex; justify-content:space-between; align-items:center;"><h2>📰 News</h2><button onclick="fetchAP()">🔄 Re-Sync</button></div>
                <div id="news-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:15px; margin-top:20px;"></div>
            </div>

            <div id="freebies-view" class="view-pane">
                <div style="display:flex; justify-content:space-between; align-items:center;"><h2>🎁 Deals</h2><button onclick="fetchFreebies()">🔄 Refresh</button></div>
                <div id="freebies-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:15px; margin-top:20px;"></div>
            </div>

            <div id="wiki-content-view" class="view-pane">
                <input type="text" id="wiki-title-display" style="font-size:28px; font-weight:800; border:none; background:transparent; width:100%; color:inherit; margin-bottom:20px;">
                <div style="display:flex; gap:10px; margin-bottom:20px;"><button id="wiki-mode-preview" class="btn btn-active">Preview</button><button id="wiki-mode-edit" class="btn">Edit</button></div>
                <textarea id="wiki-notes" style="display:none; width:100%; height:60vh; background:transparent; border:1px solid var(--border); padding:15px; color:inherit; font-size:16px;"></textarea>
                <div id="wiki-preview" style="line-height:1.7;"></div>
            </div>
        </div>
    </div>

    <div id="editor-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:9000; justify-content:center; align-items:center; backdrop-filter:blur(2px);">
        <div style="background:var(--card-bg); width:95%; max-width:700px; padding:30px; border-radius:12px; position:relative; max-height: 90vh; overflow-y: auto;">
            <button id="close-modal" style="position:absolute; top:20px; right:20px; background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
            <input type="text" id="modal-title-display" style="font-size:22px; font-weight:800; border:none; background:transparent; width:90%; color:inherit;">
            
            <div style="margin:20px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); padding:15px 0;">
                <label style="font-size:11px; font-weight:800; color:#888;">CATEGORY:</label>
                <select id="modal-label-select" style="margin-left:10px; background:var(--sidebar); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:8px;">
                    <option value="none">None</option>
                    <option value="mortgage">🏠 Mortgage</option>
                    <option value="church">⛪ Church</option>
                    <option value="sunday-school">📖 Sunday School</option>
                    <option value="urgent">🚨 Urgent</option>
                </select>
            </div>

            <div style="margin:15px 0; display:flex; gap:10px;"><button id="task-mode-preview" class="btn btn-active">Preview</button><button id="task-mode-edit" class="btn">Edit</button></div>
            <textarea id="modal-notes" style="display:none; width:100%; height:300px; background:transparent; border:1px solid var(--border); padding:15px; color:inherit; font-size:16px;"></textarea>
            <div id="modal-preview"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        const firebaseConfig = { apiKey: "AIzaSyBrD9wri02pLZARr8BI600KTCbuIBTH1MI", authDomain: "kanbanjake.firebaseapp.com", projectId: "kanbanjake", storageBucket: "kanbanjake.firebasestorage.app", messagingSenderId: "207756213915", appId: "1:207756213915:web:2f546c9a9c7d28b189103e" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app); const auth = getAuth(app); const provider = new GoogleAuthProvider();
        let curTaskId = null, curWikiId = null, allTasks = [], allWiki = [], isEditing = false, sortables = [];

        // --- THEME ENGINE ---
        const applyTheme = (t) => { document.body.setAttribute('data-theme', t); localStorage.setItem('theme', t); };
        applyTheme(localStorage.getItem('theme') || 'light');
        document.getElementById('theme-toggle').onclick = () => applyTheme(document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

        const showView = (vid) => {
            document.querySelectorAll('.view-pane').forEach(p => p.style.display = 'none');
            const target = document.getElementById(vid); if(target) target.style.display = 'flex';
            if(vid === 'news-view') fetchAP(); if(vid === 'freebies-view') fetchFreebies();
        };

        // --- GLOBAL SEARCH (Cmd+K) ---
        window.onkeydown = (e) => {
            if((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search-palette').style.display='flex'; document.getElementById('search-input').focus(); }
            if(e.key === 'Escape') document.getElementById('search-palette').style.display='none';
        };

        // --- HARD-LOCKED EVENT DELEGATION ---
        document.addEventListener('click', (e) => {
            const nav = e.target.closest('[data-view]'); if(nav) showView(nav.getAttribute('data-view'));
            const card = e.target.closest('.card'); if(card) {
                const tid = card.getAttribute('data-id'); const t = allTasks.find(d => d.id === tid);
                if(t) openTask(tid, t.data());
            }
            const wiki = e.target.closest('.wiki-nav-btn'); if(wiki) {
                const wid = wiki.getAttribute('data-id'); const w = allWiki.find(d => d.id === wid);
                if(w) openWiki(wid, w.data());
            }
        });

        // --- AUTH & DATA ---
        onAuthStateChanged(auth, async (u) => {
            if(u) { document.getElementById('login-screen').style.display='none'; document.getElementById('app-container').style.display='flex';
            } else { document.getElementById('login-screen').style.display='flex'; }
        });
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        onSnapshot(collection(db, "tasks"), (s) => {
            allTasks = s.docs; if(isEditing) return;
            ['todo','doing','done'].forEach(st => {
                const list = document.getElementById(`${st}-list`); list.innerHTML = '';
                allTasks.filter(d => d.data().status === st).forEach(d => {
                    const t = d.data(); const card = document.createElement('div'); card.className = 'card'; card.setAttribute('data-id', d.id);
                    card.innerHTML = `<div class="badge badge-${t.label || 'none'}">${t.label || ''}</div><div>${t.text}</div>`;
                    list.appendChild(card);
                });
            });
            sortables.forEach(s => s.destroy());
            sortables = ['todo-list','doing-list','done-list'].map(id => new Sortable(document.getElementById(id), { group: 'kanban', onEnd: async (e) => {
                await updateDoc(doc(db, 'tasks', e.item.getAttribute('data-id')), { status: e.to.id.split('-')[0] });
            }}));
        });

        onSnapshot(collection(db, "wiki"), (s) => {
            allWiki = s.docs; const list = document.getElementById('sidebar-wiki-list'); list.innerHTML = '';
            s.docs.forEach(d => {
                const btn = document.createElement('button'); btn.className = 'nav-item wiki-nav-btn'; btn.innerText = `📄 ${d.data().title}`; btn.setAttribute('data-id', d.id);
                list.appendChild(btn);
            });
        });

        // --- WIDGET ENGINES (DUAL PROXY) ---
        const multiFetch = async (url) => {
            const proxies = [`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, `https://corsproxy.io/?${encodeURIComponent(url)}`];
            for(let p of proxies) {
                try {
                    const res = await fetch(`${p}&cb=${Date.now()}`, { signal: AbortSignal.timeout(5000) });
                    if(res.ok) { const raw = await res.json(); return raw.contents || raw; }
                } catch(e) { continue; }
            }
            return null;
        };

        window.fetchAP = async () => {
            const c = document.getElementById('news-container'); c.innerHTML = '<p>Syncing AP...</p>';
            const data = await multiFetch('https://news.google.com/rss/search?q=when:24h+AP+News&hl=en-US&gl=US&ceid=US:en');
            if(!data) { c.innerHTML = '<p>AP Jammed.</p>'; return; }
            const xml = new DOMParser().parseFromString(data, "text/xml"); c.innerHTML = '';
            Array.from(xml.querySelectorAll("item")).slice(0,10).forEach(i => {
                const div = document.createElement('div'); div.className = 'card'; div.innerHTML = `<b>${i.querySelector("title").textContent}</b>`;
                div.onclick = () => window.open(i.querySelector("link").textContent, '_blank'); c.appendChild(div);
            });
        };

        window.fetchFreebies = async () => {
            const c = document.getElementById('freebies-container'); c.innerHTML = '<p>Syncing Deals...</p>';
            const data = await multiFetch('https://www.reddit.com/r/freebies.json?limit=10');
            if(!data) { c.innerHTML = '<p>Deals Jammed.</p>'; return; }
            const items = typeof data === 'string' ? JSON.parse(data).data.children : data.data.children; c.innerHTML = '';
            items.forEach(i => {
                const div = document.createElement('div'); div.className = 'card'; div.innerHTML = `<b>${i.data.title}</b>`;
                div.onclick = () => window.open(`https://reddit.com${i.data.permalink}`, '_blank'); c.appendChild(div);
            });
        };

        // --- ACTIONS ---
        const openTask = (id, data) => { curTaskId = id; isEditing = true; document.getElementById('modal-title-display').value = data.text; document.getElementById('modal-label-select').value = data.label || 'none'; document.getElementById('modal-notes').value = data.notes || ''; document.getElementById('task-mode-preview').click(); document.getElementById('editor-modal').style.display='flex'; };
        const openWiki = (id, data) => { curWikiId = id; isEditing = false; document.getElementById('wiki-title-display').value = data.title; document.getElementById('wiki-notes').value = data.content || ''; document.getElementById('wiki-mode-preview').click(); showView('wiki-content-view'); };

        document.getElementById('modal-notes').oninput = async () => { if(curTaskId && isEditing) await updateDoc(doc(db, 'tasks', curTaskId), { notes: document.getElementById('modal-notes').value }); };
        document.getElementById('modal-label-select').onchange = async (e) => { 
            if(curTaskId && isEditing) { 
                await updateDoc(doc(db, 'tasks', curTaskId), { label: e.target.value });
                // Force local badge update
                const card = document.querySelector(`.card[data-id="${curTaskId}"] .badge`);
                if(card) { card.className = `badge badge-${e.target.value}`; card.innerText = e.target.value; }
            }
        };

        document.getElementById('task-mode-preview').onclick = () => { isEditing = false; document.getElementById('modal-notes').style.display='none'; document.getElementById('modal-preview').style.display='block'; document.getElementById('modal-preview').innerHTML = marked.parse(document.getElementById('modal-notes').value); };
        document.getElementById('task-mode-edit').onclick = () => { isEditing = true; document.getElementById('modal-notes').style.display='block'; document.getElementById('modal-preview').style.display='none'; };
        document.getElementById('close-modal').onclick = () => { document.getElementById('editor-modal').style.display='none'; isEditing = false; };
        document.getElementById('add-btn').onclick = () => { const t = prompt("Task?"); if(t) addDoc(collection(db, "tasks"), { text: t, status: 'todo', label: 'none' }); };
    </script>
</body>
</html>
