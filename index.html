<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jake's Workspace</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root { 
            --bg: #f7f7f5; --text: #37352f; --sidebar: #ebebec; --border: #e0e0e0; 
            --card-bg: #ffffff; --accent: #4338ca; --nav-hover: rgba(0,0,0,0.05);
        }
        body.dark-mode { 
            --bg: #121212; --text: #e0e0e0; --sidebar: #1e1e1e; --border: #333; 
            --card-bg: #1e1e1e; --accent: #818cf8; --nav-hover: rgba(255,255,255,0.05);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100vh; background-color: var(--bg); color: var(--text); overflow: hidden; display: flex; transition: background 0.3s; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border); }
        
        /* --- SIDEBAR --- */
        #sidebar { width: 260px; background-color: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; flex-shrink: 0; }
        .sidebar-section-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 5px; }
        .nav-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; font-size: 14px; transition: 0.2s; }
        .nav-item:hover { background: var(--nav-hover); }
        .active-nav { background: var(--border) !important; font-weight: 600; }
        .nav-timestamp { font-size: 9px; color: #888; text-transform: uppercase; }

        #mobile-switcher { display: none; position: fixed; bottom: 0; width: 100%; background: var(--sidebar); border-top: 1px solid var(--border); height: 65px; z-index: 2000; justify-content: space-around; align-items: center; }
        .switch-btn { background: none; border: none; color: var(--text); display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; opacity: 0.6; }
        .switch-btn.active { opacity: 1; color: var(--accent); }

        /* --- TAG PILLS FIX --- */
        #tag-cloud { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 15px; margin-bottom: 5px; white-space: nowrap; -webkit-overflow-scrolling: touch; min-height: 40px; }
        .tag-pill { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); font-size: 12px; font-weight: 600; cursor: pointer; height: fit-content; flex-shrink: 0; }
        .tag-pill.active { background: var(--accent); color: white; border-color: var(--accent); }
        .search-bar { background: var(--bg); border: 1px solid var(--border); padding: 10px; border-radius: 8px; color: inherit; outline: none; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #kanban-view, #wiki-list-view, #wiki-content-view { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; width: 100%; box-sizing: border-box; }

        /* --- KANBAN BOARD --- */
        #kanban-board { display: flex; gap: 20px; flex-grow: 1; align-items: flex-start; }
        .column { min-width: 300px; width: 300px; display: flex; flex-direction: column; max-height: 100%; }
        .column-header { font-weight: 700; padding-bottom: 15px; display: flex; justify-content: space-between; align-items: center; font-size: 15px; }
        .card-list { flex-grow: 1; padding: 5px; min-height: 150px; overflow-y: auto; }
        .card { background: var(--card-bg); padding: 16px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: 0.2s; position: relative; }
        
        .countdown { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-top: 8px; display: inline-block; }
        .overdue { background: #fee2e2; color: #ef4444; }
        .soon { background: #ffedd5; color: #f59e0b; }
        .later { background: #f3f4f6; color: #6b7280; }

        /* --- WIKI HEADER ARRANGEMENT --- */
        .wiki-header { border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .wiki-header-main { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .wiki-header-meta { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .toc-container { background: var(--sidebar); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid var(--border); }
        .toc-link { display: block; color: var(--accent); text-decoration: none; font-size: 13px; margin-bottom: 5px; cursor: pointer; }
        
        .sync-status { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #888; }
        .sync-saving { color: var(--accent); }

        #editor-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 750px; height: 85vh; border-radius: 12px; padding: 30px; display: flex; flex-direction: column; position: relative; box-sizing: border-box; }
        .textarea { flex-grow: 1; border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: inherit; font-size: 16px; margin-top: 15px; background: rgba(0,0,0,0.02); color: inherit; outline: none; resize: none; }
        .preview-area { flex-grow: 1; overflow-y: auto; padding: 15px; border: 1px solid var(--border); border-radius: 8px; margin-top: 15px; line-height: 1.6; scroll-behavior: smooth; }

        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; white-space: nowrap; }
        .btn-toggle { background: var(--sidebar); color: var(--text); }
        .btn-toggle.active { background: var(--accent); color: white; }
        .btn-delete { color: #ff4d4f; background: transparent; border: 1px solid #ff4d4f; }

        @media (max-width: 768px) {
            #sidebar { display: none; }
            #mobile-switcher { display: flex; }
            #main-content { padding-bottom: 65px; }
            #kanban-board { overflow-x: auto; scroll-snap-type: x mandatory; padding: 10px; gap: 15px; }
            .column { min-width: 85vw; scroll-snap-align: center; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="margin-top:0">Jake's Workspace</h2>
            <button id="login-btn" class="btn" style="background:var(--accent); color:white; width:100%; margin-top:10px;">Sign in with Google</button>
        </div>
    </div>

    <div id="mobile-switcher">
        <button id="switch-tasks" class="switch-btn active"><span>📊</span><span>TASKS</span></button>
        <button id="switch-wiki" class="switch-btn"><span>📄</span><span>WIKI</span></button>
        <button id="mobile-theme-toggle" class="switch-btn"><span id="theme-icon">🌙</span><span>THEME</span></button>
    </div>

    <div id="app-container" style="display:none; width: 100%;">
        <div id="sidebar">
            <div class="sidebar-section-label">Main</div>
            <div id="nav-kanban" class="nav-item active-nav"><span>📊 Kanban Board</span></div>
            <div class="sidebar-section-label">Wiki Library</div>
            <input type="text" id="desktop-wiki-search" class="search-bar" placeholder="Search pages...">
            <div id="wiki-nav-list" style="flex-grow: 1; overflow-y: auto;"></div>
            <button id="add-wiki-btn" class="btn" style="background:none; border: 1px dashed #888; color: #888; width: 100%; margin-top: 10px;">+ New Page</button>
            <div style="margin-top: 20px; display: flex; gap: 8px;">
                <button id="theme-toggle" class="btn" style="flex: 1; background: var(--border); color: var(--text);">🌙 Mode</button>
                <button id="logout-btn" class="btn" style="flex: 1; background: var(--border); color: var(--text);">🚪 Out</button>
            </div>
        </div>

        <div id="main-content">
            <div id="kanban-view">
                <div id="tag-cloud"></div>
                <div id="kanban-board">
                    <div class="column" data-status="todo">
                        <div class="column-header">To Do <button id="add-btn" class="btn" style="background:var(--accent); color:white; padding: 2px 10px;">+ Add</button></div>
                        <div class="card-list" id="todo-list"></div>
                    </div>
                    <div class="column" data-status="doing">
                        <div class="column-header">Doing</div>
                        <div class="card-list" id="doing-list"></div>
                    </div>
                    <div class="column" data-status="done">
                        <div class="column-header">Done <button id="bulk-archive-btn" style="background:none; border:none; cursor:pointer; font-size:16px;">🧹</button></div>
                        <div class="card-list" id="done-list"></div>
                    </div>
                </div>
            </div>

            <div id="wiki-list-view" style="display: none;">
                <h2 style="margin-top:0">Wiki Library</h2>
                <input type="text" id="mobile-wiki-search" class="search-bar" placeholder="Filter pages...">
                <div id="wiki-mobile-list" style="display: flex; flex-direction: column; gap: 10px;"></div>
                <button id="add-wiki-mobile" class="btn" style="margin-top: 20px; border: 1px dashed #888; width:100%">+ Create New Page</button>
            </div>

            <div id="wiki-content-view" style="display: none;">
                <div class="wiki-header">
                    <div id="wiki-back-btn" style="display: none; color: var(--accent); cursor: pointer; font-weight: bold; margin-bottom: 10px;">← All Pages</div>
                    <div class="wiki-header-main">
                        <input type="text" id="wiki-title-display" style="font-size:28px; font-weight:800; border:none; background:transparent; outline:none; color:inherit; flex-grow:1;" placeholder="Page Title">
                        <div id="wiki-sync-indicator" class="sync-status">Synced</div>
                    </div>
                    <div class="wiki-header-meta">
                        <div style="font-size: 11px; font-weight: bold;">🏷️ Tag: <input type="text" id="wiki-tag-input" style="border:1px solid var(--border); border-radius:4px; padding:4px; width:120px; font-size:12px; background:transparent; color:inherit;" placeholder="Project"></div>
                        <button id="wiki-mode-preview" class="btn btn-toggle active">Preview</button>
                        <button id="wiki-mode-edit" class="btn btn-toggle">Edit</button>
                        <button id="delete-wiki-btn" class="btn btn-delete" style="padding:4px 10px; font-size:11px;">Delete</button>
                    </div>
                </div>
                <div id="wiki-toc" class="toc-container" style="display:none;"></div>
                <textarea id="wiki-notes" class="textarea" style="display:none;"></textarea>
                <div id="wiki-preview" class="preview-area"></div>
            </div>
        </div>
    </div>

    <div id="editor-modal">
        <div class="modal-content">
            <button id="close-modal" style="background: none; border: none; font-size: 28px; color: #888; cursor: pointer; position: absolute; right: 20px; top: 20px;">&times;</button>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <input type="text" id="modal-title-display" style="font-size:24px; font-weight:800; border:none; background:transparent; outline:none; color:inherit;" placeholder="Task Name">
                <div id="task-sync-indicator" class="sync-status">Synced</div>
            </div>
            <div style="display: flex; gap: 15px; align-items: center; margin-top: 15px; border-bottom: 1px solid var(--border); padding-bottom: 15px; flex-wrap: wrap;">
                <div style="font-size: 11px; font-weight: bold;">📅 Due: <input type="date" id="task-due-date" style="border:1px solid var(--border); border-radius:4px; padding:4px; font-size:12px; background:transparent; color:inherit;"></div>
                <div style="font-size: 11px; font-weight: bold;">🏷️ Tag: <input type="text" id="task-tag-input" style="border:1px solid var(--border); border-radius:4px; padding:4px; width:100px; font-size:12px; background:transparent; color:inherit;"></div>
                <button id="task-mode-preview" class="btn btn-toggle active">Preview</button>
                <button id="task-mode-edit" class="btn btn-toggle">Edit</button>
            </div>
            <textarea id="modal-notes" class="textarea" style="display:none;"></textarea>
            <div id="modal-preview" class="preview-area"></div>
            <div style="display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; padding-top: 15px; border-top: 1px solid var(--border);">
                <div style="width: 100%; font-size: 10px; font-weight: bold; color: #888; margin-bottom: 5px;">MOVE TO:</div>
                <button class="btn" style="background:var(--bg); flex:1" onclick="moveTask('todo')">To Do</button>
                <button class="btn" style="background:var(--bg); flex:1" onclick="moveTask('doing')">Doing</button>
                <button class="btn" style="background:var(--bg); flex:1" onclick="moveTask('done')">Done</button>
            </div>
            <div style="margin-top: 15px; display: flex; justify-content: space-between; align-items: center;">
                <button id="delete-task-btn" class="btn btn-delete">Delete Task</button>
                <div id="task-last-edited" style="font-size: 10px; color: #888;"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrD9wri02pLZARr8BI600KTCbuIBTH1MI",
            authDomain: "kanbanjake.firebaseapp.com",
            projectId: "kanbanjake",
            storageBucket: "kanbanjake.firebasestorage.app",
            messagingSenderId: "207756213915",
            appId: "1:207756213915:web:2f546c9a9c7d28b189103e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const tasksCol = collection(db, "tasks");
        const wikiCol = collection(db, "wiki");

        let curTaskId = null, curWikiId = null, currentTagFilter = 'All', allTasks = [], allWiki = [];

        const debounce = (func, wait) => {
            let timeout;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        };

        const formatTime = (ts) => {
            if (!ts) return '';
            const date = ts.toDate ? ts.toDate() : new Date(ts);
            const diff = (new Date() - date) / 1000;
            if (diff < 60) return 'JUST NOW';
            if (diff < 3600) return Math.floor(diff/60) + 'm AGO';
            if (diff < 86400) return Math.floor(diff/3600) + 'h AGO';
            return date.toLocaleDateString(undefined, {month:'short', day:'numeric'});
        };

        function generateTOC(markdown, tocId, previewId) {
            const lines = markdown.split('\n');
            const toc = document.getElementById(tocId);
            const preview = document.getElementById(previewId);
            toc.innerHTML = '<div style="font-size:11px; font-weight:bold; color:#888; margin-bottom:10px;">📍 JUMP TO SECTION</div>';
            let found = false;
            lines.forEach(line => {
                const match = line.match(/^(#{1,2})\s+(.+)$/);
                if (match) {
                    found = true;
                    const id = match[2].toLowerCase().replace(/[^\w]+/g, '-');
                    const link = document.createElement('a');
                    link.className = 'toc-link' + (match[1].length === 2 ? ' toc-sub' : '');
                    link.innerText = (match[1].length === 2 ? '↳ ' : '') + match[2];
                    link.onclick = () => preview.querySelector('#' + id)?.scrollIntoView({ behavior: 'smooth' });
                    toc.appendChild(link);
                }
            });
            toc.style.display = found ? 'block' : 'none';
        }

        const applyTheme = (t) => {
            document.body.classList.toggle('dark-mode', t === 'dark');
            localStorage.setItem('theme', t);
        };
        applyTheme(localStorage.getItem('theme') || 'light');
        document.getElementById('theme-toggle').onclick = document.getElementById('mobile-theme-toggle').onclick = () => applyTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark');

        const kanbanView = document.getElementById('kanban-view'), wikiListView = document.getElementById('wiki-list-view'), wikiContentView = document.getElementById('wiki-content-view');
        const taskBtn = document.getElementById('switch-tasks'), wikiBtn = document.getElementById('switch-wiki');

        function showView(view) {
            [kanbanView, wikiListView, wikiContentView].forEach(v => v.style.display = 'none');
            view.style.display = 'flex';
            if (window.innerWidth <= 768) document.getElementById('wiki-back-btn').style.display = (view === wikiContentView) ? 'block' : 'none';
        }

        const goToKanban = () => { 
            showView(kanbanView); taskBtn.classList.add('active'); wikiBtn.classList.remove('active'); 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav')); document.getElementById('nav-kanban').classList.add('active-nav'); 
        };
        taskBtn.onclick = document.getElementById('nav-kanban').onclick = goToKanban;
        wikiBtn.onclick = () => { if (window.innerWidth <= 768) showView(wikiListView); else showView(wikiContentView); wikiBtn.classList.add('active'); taskBtn.classList.remove('active'); };
        document.getElementById('wiki-back-btn').onclick = () => showView(wikiListView);

        const setStatus = (id, status) => { const el = document.getElementById(id); el.innerText = status; el.classList.toggle('sync-saving', status === 'Saving...'); };

        const autoSaveTask = debounce(async () => {
            if (!curTaskId) return;
            setStatus('task-sync-indicator', 'Saving...');
            await updateDoc(doc(db, 'tasks', curTaskId), { 
                text: document.getElementById('modal-title-display').value,
                notes: document.getElementById('modal-notes').value,
                dueDate: document.getElementById('task-due-date').value,
                tag: document.getElementById('task-tag-input').value,
                lastEdited: serverTimestamp()
            });
            setStatus('task-sync-indicator', 'Synced');
        }, 1500);

        const autoSaveWiki = debounce(async () => {
            if (!curWikiId) return;
            setStatus('wiki-sync-indicator', 'Saving...');
            await updateDoc(doc(db, 'wiki', curWikiId), { 
                title: document.getElementById('wiki-title-display').value,
                content: document.getElementById('wiki-notes').value,
                tag: document.getElementById('wiki-tag-input').value,
                lastEdited: serverTimestamp()
            });
            setStatus('wiki-sync-indicator', 'Synced');
        }, 1500);

        ['modal-title-display', 'task-due-date', 'task-tag-input', 'modal-notes'].forEach(id => document.getElementById(id).addEventListener('input', autoSaveTask));
        ['wiki-title-display', 'wiki-tag-input', 'wiki-notes'].forEach(id => document.getElementById(id).addEventListener('input', autoSaveWiki));

        function renderBoard() {
            updateTagCloud();
            ['todo-list', 'doing-list', 'done-list'].forEach(id => document.getElementById(id).innerHTML = '');
            allTasks.forEach(d => {
                const t = d.data();
                if ((currentTagFilter !== 'All' && t.tag !== currentTagFilter) || t.status === 'archived') return;
                const card = document.createElement('div'); card.className = 'card'; card.setAttribute('data-id', d.id);
                const diff = Math.ceil((new Date(t.dueDate + "T23:59:59") - new Date()) / (1000 * 60 * 60 * 24));
                let cdHtml = t.dueDate ? `<div class="countdown ${diff < 0 ? 'overdue' : (diff <= 3 ? 'soon' : 'later')}">${diff < 0 ? 'OVERDUE' : (diff === 0 ? 'DUE TODAY' : `${diff} DAYS LEFT`)}</div>` : '';
                card.innerHTML = `<span style="color:#ccc; margin-right:8px; font-weight:bold;">⠿</span> ${t.text} ${cdHtml}`;
                card.onclick = () => openTask(d.id, t);
                document.getElementById(`${t.status}-list`).appendChild(card);
            });
        }

        function updateTagCloud() {
            const tags = new Set(['All']);
            allTasks.forEach(t => { if(t.data().tag) tags.add(t.data().tag); });
            allWiki.forEach(w => { if(w.data().tag) tags.add(w.data().tag); });
            const cloud = document.getElementById('tag-cloud'); cloud.innerHTML = '';
            tags.forEach(tag => {
                const pill = document.createElement('div'); pill.className = `tag-pill ${currentTagFilter === tag ? 'active' : ''}`;
                pill.innerText = tag; pill.onclick = () => { currentTagFilter = tag; renderBoard(); renderWikiList(); };
                cloud.appendChild(pill);
            });
        }

        function renderWikiList() {
            const dList = document.getElementById('wiki-nav-list'), mList = document.getElementById('wiki-mobile-list');
            dList.innerHTML = ''; mList.innerHTML = '';
            const sortedWiki = [...allWiki].sort((a,b) => (b.data().lastEdited?.seconds || 0) - (a.data().lastEdited?.seconds || 0));
            sortedWiki.forEach(d => {
                const p = d.data();
                if (currentTagFilter !== 'All' && p.tag !== currentTagFilter) return;
                const item = document.createElement('div'); item.className = 'nav-item';
                item.innerHTML = `<span>📄 ${p.title}</span><span class="nav-timestamp">${formatTime(p.lastEdited)}</span>`;
                item.onclick = () => { curWikiId = d.id; openWiki(p); };
                const dt = item.cloneNode(true); dt.onclick = item.onclick; dList.appendChild(dt);
                const mt = item.cloneNode(true); mt.className = 'card'; mt.style.flexDirection = 'row'; mt.style.justifyContent = 'space-between'; mt.onclick = item.onclick; mList.appendChild(mt);
            });
        }

        function startApp() {
            onSnapshot(tasksCol, (snap) => { allTasks = snap.docs; renderBoard(); });
            onSnapshot(wikiCol, (snap) => { allWiki = snap.docs; renderWikiList(); updateTagCloud(); });
            ['todo-list', 'doing-list', 'done-list'].forEach(id => new Sortable(document.getElementById(id), { group: 'kanban', animation: 150, delay: 200, delayOnTouchOnly: true, onEnd: (evt) => { const taskId = evt.item.getAttribute('data-id'); const newStatus = evt.to.parentElement.getAttribute('data-status'); if (taskId) updateDoc(doc(db, 'tasks', taskId), { status: newStatus }); } }));
        }

        window.moveTask = async (status) => { if (curTaskId) { await updateDoc(doc(db, 'tasks', curTaskId), { status: status, lastEdited: serverTimestamp() }); document.getElementById('editor-modal').style.display = 'none'; } };

        const setupToggle = (prefix, notesEl, previewEl, tocId) => {
            const btnP = document.getElementById(`${prefix}-mode-preview`), btnE = document.getElementById(`${prefix}-mode-edit`);
            btnP.onclick = () => { 
                notesEl.style.display = 'none'; previewEl.style.display = 'block'; btnP.classList.add('active'); btnE.classList.remove('active'); 
                const rend = new marked.Renderer();
                rend.heading = (t, l) => `<h${l} id="${t.toLowerCase().replace(/[^\w]+/g, '-')}">${t}</h${l}>`;
                previewEl.innerHTML = marked.parse(notesEl.value || "", { renderer: rend });
                if (tocId) generateTOC(notesEl.value || "", tocId, prefix + '-preview');
            };
            btnE.onclick = () => { notesEl.style.display = 'block'; previewEl.style.display = 'none'; btnE.classList.add('active'); btnP.classList.remove('active'); if(tocId) document.getElementById(tocId).style.display = 'none'; };
        };
        setupToggle('task', document.getElementById('modal-notes'), document.getElementById('modal-preview'));
        setupToggle('wiki', document.getElementById('wiki-notes'), document.getElementById('wiki-preview'), 'wiki-toc');

        function openTask(id, t) { curTaskId = id; document.getElementById('modal-title-display').value = t.text; document.getElementById('task-due-date').value = t.dueDate || ''; document.getElementById('task-tag-input').value = t.tag || ''; document.getElementById('modal-notes').value = t.notes || ''; document.getElementById('task-last-edited').innerText = 'Last edited: ' + formatTime(t.lastEdited); setStatus('task-sync-indicator', 'Synced'); document.getElementById('task-mode-preview').click(); document.getElementById('editor-modal').style.display = 'flex'; }
        function openWiki(p) { showView(wikiContentView); document.getElementById('wiki-title-display').value = p.title; document.getElementById('wiki-tag-input').value = p.tag || ''; document.getElementById('wiki-notes').value = p.content || ''; setStatus('wiki-sync-indicator', 'Synced'); document.getElementById('wiki-mode-preview').click(); }

        document.getElementById('add-wiki-btn').onclick = document.getElementById('add-wiki-mobile').onclick = () => { const t = prompt("Page Title?"); if(t) addDoc(wikiCol, { title: t, content: '', tag: currentTagFilter !== 'All' ? currentTagFilter : '', lastEdited: serverTimestamp() }); };
        document.getElementById('add-btn').onclick = () => { const t = prompt("Task Name?"); if(t) addDoc(tasksCol, { text: t, status: 'todo', tag: currentTagFilter !== 'All' ? currentTagFilter : 'General', notes: '', lastEdited: serverTimestamp() }); };
        document.getElementById('delete-task-btn').onclick = () => { if(confirm("Delete?")) { deleteDoc(doc(db, 'tasks', curTaskId)); document.getElementById('editor-modal').style.display = 'none'; } };
        document.getElementById('delete-wiki-btn').onclick = () => { if(confirm("Delete?")) { deleteDoc(doc(db, 'wiki', curWikiId)); goToKanban(); } };
        document.getElementById('close-modal').onclick = () => document.getElementById('editor-modal').style.display = 'none';
        document.getElementById('bulk-archive-btn').onclick = () => { if(confirm("Archive all completed tasks?")) { allTasks.forEach(d => { if(d.data().status === 'done') updateDoc(doc(db, 'tasks', d.id), { status: 'archived', lastEdited: serverTimestamp() }); }); } };

        onAuthStateChanged(auth, (user) => { if (user) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('app-container').style.display = 'flex'; startApp(); } else { document.getElementById('login-screen').style.display = 'flex'; document.getElementById('app-container').style.display = 'none'; } });
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);
    </script>
</body>
</html>
