<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jake's Workspace</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root { 
            --bg: #f7f7f5; --text: #37352f; --sidebar: #ebebec; --border: #e0e0e0; 
            --card-bg: #ffffff; --accent: #4338ca; --nav-hover: rgba(0,0,0,0.05);
        }
        body.dark-mode { 
            --bg: #121212; --text: #e0e0e0; --sidebar: #1e1e1e; --border: #333; 
            --card-bg: #1e1e1e; --accent: #818cf8; --nav-hover: rgba(255,255,255,0.05);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100vh; background-color: var(--bg); color: var(--text); overflow: hidden; display: flex; transition: background 0.3s; }
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border); }
        
        #sidebar { width: 260px; background-color: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; flex-shrink: 0; }
        .sidebar-section-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 5px; }
        .nav-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; font-size: 14px; transition: 0.2s; }
        .nav-item:hover { background: var(--nav-hover); }
        .active-nav { background: var(--border) !important; font-weight: 600; }

        .search-bar { background: var(--bg); border: 1px solid var(--border); padding: 10px; border-radius: 8px; color: inherit; outline: none; width: 100%; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }
        #main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #kanban-view, #wiki-content-view, #news-view { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; width: 100%; box-sizing: border-box; }

        /* News Cards */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .news-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; }
        .news-title { font-size: 15px; font-weight: bold; padding: 15px; line-height: 1.4; flex-grow: 1; }
        .news-link { font-size: 11px; font-weight: bold; color: var(--accent); padding: 0 15px 15px; text-decoration: none; text-transform: uppercase; }

        /* Toolbar */
        .toolbar { display: flex; gap: 4px; background: var(--bg); padding: 5px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 10px; flex-wrap: wrap; }
        .toolbar-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--text); }
        .toolbar-btn:hover { background: var(--accent); color: white; }

        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-toggle { background: var(--sidebar); color: var(--text); }
        .btn-toggle.active { background: var(--accent); color: white; }

        #editor-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 4000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 750px; height: 85vh; border-radius: 12px; padding: 30px; display: flex; flex-direction: column; position: relative; box-sizing: border-box; }
        .textarea { flex-grow: 1; border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: inherit; font-size: 16px; background: rgba(0,0,0,0.02); color: inherit; outline: none; resize: none; }
        .preview-area { flex-grow: 1; overflow-y: auto; padding: 15px; border: 1px solid var(--border); border-radius: 8px; line-height: 1.6; }

        @media (max-width: 768px) { #sidebar { display: none; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Jake's Workspace</h2>
            <button id="login-btn" class="btn" style="background:var(--accent); color:white;">Sign in with Google</button>
        </div>
    </div>

    <div id="app-container" style="display:none; width: 100%;">
        <div id="sidebar">
            <div class="sidebar-section-label">Main</div>
            <div id="nav-kanban" class="nav-item active-nav">📊 Kanban Board</div>
            <div id="nav-news" class="nav-item">📰 AP News Feed</div>
            <div class="sidebar-section-label">Wiki Library</div>
            <input type="text" id="desktop-wiki-search" class="search-bar" placeholder="Search library...">
            <div id="wiki-nav-list" style="flex-grow: 1; overflow-y: auto;"></div>
            <button id="add-wiki-btn" class="btn" style="background:none; border: 1px dashed #888; width:100%;">+ New Page</button>
            <div style="margin-top: 20px; display: flex; gap: 8px;">
                <button id="theme-toggle" class="btn" style="flex: 1; background: var(--border);">🌙 Mode</button>
                <button id="logout-btn" class="btn" style="flex: 1; background: var(--border);">🚪 Out</button>
            </div>
        </div>

        <div id="main-content">
            <div id="kanban-view">
                <div id="kanban-board" style="display:flex; gap:20px;">
                    <div class="column" style="width:300px;">
                        <div class="column-header" style="font-weight:700; padding-bottom:15px; display:flex; justify-content:space-between;">To Do <button id="add-btn" class="btn" style="background:var(--accent); color:white; padding:2px 8px; font-size:11px;">+ Add</button></div>
                        <div id="todo-list" style="min-height:200px;"></div>
                    </div>
                    <div class="column" style="width:300px;">
                        <div class="column-header" style="font-weight:700; padding-bottom:15px;">Doing</div>
                        <div id="doing-list" style="min-height:200px;"></div>
                    </div>
                    <div class="column" style="width:300px;">
                        <div class="column-header" style="font-weight:700; padding-bottom:15px; display:flex; justify-content:space-between;">Done <button id="bulk-archive-btn" style="background:none; border:none; cursor:pointer;">🧹</button></div>
                        <div id="done-list" style="min-height:200px;"></div>
                    </div>
                </div>
            </div>

            <div id="news-view" style="display:none;">
                <h2 style="margin-top:0">Associated Press: Top Stories</h2>
                <div id="news-container" class="news-grid">
                    <p>Scanning AP frequencies...</p>
                </div>
            </div>

            <div id="wiki-content-view" style="display: none;">
                <div class="wiki-header" style="border-bottom:1px solid var(--border); padding-bottom:20px; margin-bottom:10px;">
                    <input type="text" id="wiki-title-display" style="font-size:28px; font-weight:800; border:none; background:transparent; outline:none; color:inherit; width:100%;" placeholder="Page Title">
                    <div style="margin-top:10px; display:flex; gap:10px; align-items:center;">
                        <button id="wiki-mode-preview" class="btn btn-toggle active">Preview</button>
                        <button id="wiki-mode-edit" class="btn btn-toggle">Edit</button>
                        <button id="wiki-export-pdf" class="btn" style="background:var(--border); font-size:11px;">🖨️ PDF</button>
                        <button id="delete-wiki-btn" class="btn btn-delete" style="font-size:11px; background:transparent; color:#ff4d4f; border:1px solid #ff4d4f;">Delete</button>
                    </div>
                </div>
                <div id="wiki-toolbar" class="toolbar" style="display:none;">
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '**', '**')">B</button>
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '*', '*')">I</button>
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '# ', '')">H1</button>
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '## ', '')">H2</button>
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '- ', '')">List</button>
                </div>
                <textarea id="wiki-notes" class="textarea" style="display:none;"></textarea>
                <div id="wiki-preview" class="preview-area"></div>
            </div>
        </div>
    </div>

    <div id="editor-modal">
        <div class="modal-content">
            <button id="close-modal" style="position:absolute; top:20px; right:20px; background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
            <input type="text" id="modal-title-display" style="font-size:22px; font-weight:800; border:none; background:transparent; outline:none; color:inherit; width:100%;">
            <div style="margin:15px 0; display:flex; gap:10px;">
                <button id="task-mode-preview" class="btn btn-toggle active">Preview</button>
                <button id="task-mode-edit" class="btn btn-toggle">Edit</button>
            </div>
            <textarea id="modal-notes" class="textarea" style="display:none;"></textarea>
            <div id="modal-preview" class="preview-area"></div>
            <button id="delete-task-btn" class="btn btn-delete" style="margin-top:20px; background:transparent; color:#ff4d4f; border:1px solid #ff4d4f;">Delete Task</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, deleteDoc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrD9wri02pLZARr8BI600KTCbuIBTH1MI",
            authDomain: "kanbanjake.firebaseapp.com",
            projectId: "kanbanjake",
            storageBucket: "kanbanjake.firebasestorage.app",
            messagingSenderId: "207756213915",
            appId: "1:207756213915:web:2f546c9a9c7d28b189103e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const tasksCol = collection(db, "tasks");
        const wikiCol = collection(db, "wiki");

        let curTaskId = null, curWikiId = null, allTasks = [], allWiki = [];

        window.wrap = (id, pre, suf) => {
            const ta = document.getElementById(id);
            const s = ta.selectionStart, e = ta.selectionEnd, v = ta.value;
            ta.value = v.substring(0, s) + pre + v.substring(s, e) + suf + v.substring(e);
            ta.dispatchEvent(new Event('input'));
        };

        const debounce = (f, w) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => f.apply(this, a), w); }; };

        async function fetchNews() {
            const container = document.getElementById('news-container');
            try {
                // Stable AP News Proxy via Google News Search
                const rssUrl = encodeURIComponent('https://news.google.com/rss/search?q=when:24h+allinurl:apnews.com');
                const response = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${rssUrl}`);
                const data = await response.json();
                container.innerHTML = '';
                data.items.slice(0, 9).forEach(item => {
                    const card = document.createElement('div'); card.className = 'news-card';
                    card.innerHTML = `<div class="news-title">${item.title}</div><a href="${item.link}" target="_blank" class="news-link">Read Story →</a>`;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = '<p>Frequency jammed. Reconnecting...</p>'; }
        }

        const showView = (view) => {
            [document.getElementById('kanban-view'), document.getElementById('wiki-content-view'), document.getElementById('news-view')].forEach(v => v.style.display = 'none');
            view.style.display = 'flex';
            if (view === document.getElementById('news-view')) fetchNews();
        };

        document.getElementById('nav-news').onclick = () => { showView(document.getElementById('news-view')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav')); document.getElementById('nav-news').classList.add('active-nav'); };
        document.getElementById('nav-kanban').onclick = () => { showView(document.getElementById('kanban-view')); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav')); document.getElementById('nav-kanban').classList.add('active-nav'); };

        function renderMarkdown(prefix, notesEl, previewEl) {
            const rend = new marked.Renderer();
            rend.heading = (t, l) => `<h${l} id="${t.toLowerCase().replace(/[^\w]+/g, '-')}">${t}</h${l}>`;
            previewEl.innerHTML = marked.parse(notesEl.value || "", { renderer: rend });
        }

        const setupToggle = (prefix, notesEl, previewEl, toolbarId) => {
            const btnP = document.getElementById(`${prefix}-mode-preview`), btnE = document.getElementById(`${prefix}-mode-edit`);
            btnP.onclick = () => { notesEl.style.display = 'none'; previewEl.style.display = 'block'; if(toolbarId) document.getElementById(toolbarId).style.display = 'none'; btnP.classList.add('active'); btnE.classList.remove('active'); renderMarkdown(prefix, notesEl, previewEl); };
            btnE.onclick = () => { notesEl.style.display = 'block'; previewEl.style.display = 'none'; if(toolbarId) document.getElementById(toolbarId).style.display = 'flex'; btnE.classList.add('active'); btnP.classList.remove('active'); };
        };
        setupToggle('task', document.getElementById('modal-notes'), document.getElementById('modal-preview'));
        setupToggle('wiki', document.getElementById('wiki-notes'), document.getElementById('wiki-preview'), 'wiki-toolbar');

        function openWiki(d, p) { 
            curWikiId = d.id; 
            showView(document.getElementById('wiki-content-view')); 
            document.getElementById('wiki-preview').innerHTML = ''; // Hard Clear
            document.getElementById('wiki-title-display').value = p.title; 
            document.getElementById('wiki-notes').value = p.content || ''; 
            document.getElementById('wiki-mode-preview').click(); // Force Render
        }
        
        function openTask(d, t) { curTaskId = d.id; document.getElementById('modal-title-display').value = t.text; document.getElementById('modal-notes').value = t.notes || ''; document.getElementById('task-mode-preview').click(); document.getElementById('editor-modal').style.display = 'flex'; }

        function renderWikiList() {
            const list = document.getElementById('wiki-nav-list'); list.innerHTML = '';
            allWiki.forEach(d => {
                const p = d.data();
                const item = document.createElement('div'); item.className = 'nav-item';
                item.innerText = `📄 ${p.title}`;
                item.onclick = () => openWiki(d, p);
                list.appendChild(item);
            });
        }

        function renderBoard() {
            ['todo-list', 'doing-list', 'done-list'].forEach(id => document.getElementById(id).innerHTML = '');
            allTasks.forEach(d => {
                const t = d.data();
                const card = document.createElement('div'); card.className = 'card'; card.innerText = t.text;
                card.onclick = () => openTask(d, t);
                document.getElementById(`${t.status}-list`).appendChild(card);
            });
        }

        const autoSaveWiki = debounce(async () => {
            if (curWikiId) await updateDoc(doc(db, 'wiki', curWikiId), { title: document.getElementById('wiki-title-display').value, content: document.getElementById('wiki-notes').value, lastEdited: serverTimestamp() });
        }, 1500);

        document.getElementById('wiki-notes').oninput = autoSaveWiki;
        document.getElementById('wiki-title-display').oninput = autoSaveWiki;

        onSnapshot(wikiCol, (snap) => { allWiki = snap.docs; renderWikiList(); });
        onSnapshot(tasksCol, (snap) => { allTasks = snap.docs; renderBoard(); });

        onAuthStateChanged(auth, (u) => { if(u) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('app-container').style.display = 'flex'; } });
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('add-wiki-btn').onclick = () => { const t = prompt("Title?"); if(t) addDoc(wikiCol, { title: t, content: '', lastEdited: serverTimestamp() }); };
        document.getElementById('add-btn').onclick = () => { const t = prompt("Task?"); if(t) addDoc(tasksCol, { text: t, status: 'todo' }); };
        document.getElementById('close-modal').onclick = () => document.getElementById('editor-modal').style.display = 'none';
        document.getElementById('wiki-export-pdf').onclick = () => window.print();
    </script>
</body>
</html>
