<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jake's Workspace</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root { 
            --bg: #f7f7f5; --text: #37352f; --sidebar: #ebebec; --border: #e0e0e0; 
            --card-bg: #ffffff; --accent: #4338ca; --nav-hover: rgba(0,0,0,0.05);
        }
        body.dark-mode { 
            --bg: #121212; --text: #e0e0e0; --sidebar: #1e1e1e; --border: #333; 
            --card-bg: #1e1e1e; --accent: #818cf8; --nav-hover: rgba(255,255,255,0.05);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100vh; background-color: var(--bg); color: var(--text); overflow: hidden; display: flex; transition: background 0.3s; }
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border); }
        
        #sidebar { width: 260px; background-color: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; flex-shrink: 0; }
        .sidebar-section-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 5px; }
        .nav-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; font-size: 14px; transition: 0.1s; }
        .nav-item:hover { background: var(--nav-hover); }
        .active-nav { background: var(--border) !important; font-weight: 600; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #kanban-view, #wiki-content-view, #news-view { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; width: 100%; box-sizing: border-box; }

        .tag-pill { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-bg); font-size: 12px; font-weight: 600; cursor: pointer; flex-shrink: 0; margin-right: 8px; }
        .tag-pill.active { background: var(--accent); color: white; border-color: var(--accent); }

        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-top: 20px; }
        .news-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: 0.3s; display: flex; flex-direction: column; height: 100%; }
        .news-img { width: 100%; height: 180px; object-fit: cover; background: var(--sidebar); border-bottom: 1px solid var(--border); }
        .news-body { padding: 16px; flex-grow: 1; }
        .news-title { font-size: 14px; font-weight: 700; line-height: 1.4; color: var(--text); }

        .column { width: 300px; display: flex; flex-direction: column; }
        .card-list { min-height: 200px; padding-bottom: 50px; }
        .card { background: var(--card-bg); padding: 16px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; cursor: grab; }

        .toolbar { display: flex; gap: 4px; background: var(--bg); padding: 5px; border-radius: 6px; border: 1px solid var(--border); margin-bottom: 10px; }
        .toolbar-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; background: var(--card-bg); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; color: var(--text); }

        #mobile-switcher { display: none; position: fixed; bottom: 0; width: 100%; background: var(--sidebar); border-top: 1px solid var(--border); height: 65px; z-index: 2000; justify-content: space-around; align-items: center; }
        
        @media (max-width: 768px) { #sidebar { display: none; } #mobile-switcher { display: flex; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Jake's Workspace</h2>
            <button id="login-btn" class="btn" style="background:var(--accent); color:white; padding: 12px 24px; border:none; border-radius:6px; cursor:pointer;">Sign in with Google</button>
        </div>
    </div>

    <div id="app-container" style="display:none; width: 100%;">
        <div id="sidebar">
            <div class="sidebar-section-label">Main</div>
            <div id="nav-kanban" class="nav-item active-nav">📊 Kanban Board</div>
            <div id="nav-news-sidebar" class="nav-item">📰 AP News Feed</div>
            <div class="sidebar-section-label">Wiki Library</div>
            <div id="wiki-nav-list" style="flex-grow: 1; overflow-y: auto;"></div>
            <button id="add-wiki-btn" class="btn" style="background:none; border: 1px dashed #888; color:#888; width:100%; margin-top:10px; padding:8px; cursor:pointer;">+ New Page</button>
            <div style="margin-top: 20px; display: flex; gap: 8px;">
                <button id="theme-toggle" class="btn" style="flex: 1; background: var(--border); color:var(--text); padding:8px; border:none; border-radius:6px; cursor:pointer;">🌙 Mode</button>
                <button id="logout-btn" class="btn" style="flex: 1; background: var(--border); color:var(--text); padding:8px; border:none; border-radius:6px; cursor:pointer;">🚪 Out</button>
            </div>
        </div>

        <div id="main-content">
            <div id="kanban-view">
                <div id="tag-cloud" style="display:flex; padding-bottom:15px; overflow-x:auto;"></div>
                <div id="kanban-board" style="display:flex; gap:20px;">
                    <div class="column" data-status="todo">
                        <div class="column-header" style="font-weight:700; padding-bottom:15px; display:flex; justify-content:space-between;">To Do <button id="add-btn" style="background:var(--accent); color:white; border:none; padding:2px 8px; border-radius:4px; cursor:pointer;">+</button></div>
                        <div id="todo-list" class="card-list"></div>
                    </div>
                    <div class="column" data-status="doing"><div class="column-header" style="font-weight:700; padding-bottom:15px;">Doing</div><div id="doing-list" class="card-list"></div></div>
                    <div class="column" data-status="done"><div class="column-header" style="font-weight:700; padding-bottom:15px; display:flex; justify-content:space-between;">Done <button id="bulk-archive-btn" style="background:none; border:none; cursor:pointer;">🧹</button></div><div id="done-list" class="card-list"></div></div>
                </div>
            </div>

            <div id="news-view" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="margin:0">AP News: Quadrant Update</h2>
                    <button id="re-sync-btn" style="background:var(--border); border:none; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:12px;">🔄 Re-Sync Array</button>
                </div>
                <div id="news-container" class="news-grid"><p>Scanning subspace...</p></div>
            </div>

            <div id="wiki-content-view" style="display: none;">
                <div class="wiki-header" style="border-bottom:1px solid var(--border); padding-bottom:20px; margin-bottom:10px;">
                    <input type="text" id="wiki-title-display" style="font-size:28px; font-weight:800; border:none; background:transparent; outline:none; color:inherit; width:100%;" placeholder="Page Title">
                    <div style="margin-top:10px; display:flex; gap:12px; align-items:center;">
                        <button id="wiki-mode-preview" class="active" style="padding:6px 12px; border-radius:4px; border:none; cursor:pointer;">Preview</button>
                        <button id="wiki-mode-edit" style="padding:6px 12px; border-radius:4px; border:none; cursor:pointer;">Edit</button>
                        <button id="wiki-export-pdf" style="background:var(--border); border:none; padding:6px 12px; border-radius:4px; cursor:pointer;">🖨️ PDF</button>
                    </div>
                </div>
                <div id="wiki-toolbar" class="toolbar" style="display:none;">
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '**', '**')">B</button>
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '*', '*')">I</button>
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '# ', '')">H1</button>
                    <button class="toolbar-btn" onclick="wrap('wiki-notes', '- ', '')">List</button>
                </div>
                <textarea id="wiki-notes" class="textarea" style="display:none; width:100%; min-height:500px; background:transparent; border:1px solid var(--border); border-radius:8px; color:inherit;"></textarea>
                <div id="wiki-preview" class="preview-area" style="overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <div id="editor-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:4000; justify-content:center; align-items:center;">
        <div class="modal-content" style="background:var(--card-bg); width:90%; max-width:700px; padding:30px; border-radius:12px; position:relative;">
            <button id="close-modal" style="position:absolute; top:20px; right:20px; background:none; border:none; font-size:24px; cursor:pointer;">&times;</button>
            <input type="text" id="modal-title-display" style="font-size:22px; font-weight:800; border:none; background:transparent; outline:none; color:inherit; width:100%;">
            <div style="margin:15px 0; display:flex; gap:10px;">
                <button id="task-mode-preview" class="active" style="padding:6px 12px; border-radius:4px; border:none; cursor:pointer;">Preview</button>
                <button id="task-mode-edit" style="padding:6px 12px; border-radius:4px; border:none; cursor:pointer;">Edit</button>
            </div>
            <textarea id="modal-notes" class="textarea" style="display:none; width:100%; min-height:300px; background:transparent; border:1px solid var(--border); border-radius:8px; color:inherit;"></textarea>
            <div id="modal-preview" class="preview-area"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBrD9wri02pLZARr8BI600KTCbuIBTH1MI", authDomain: "kanbanjake.firebaseapp.com", projectId: "kanbanjake", storageBucket: "kanbanjake.firebasestorage.app", messagingSenderId: "207756213915", appId: "1:207756213915:web:2f546c9a9c7d28b189103e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const tasksCol = collection(db, "tasks");
        const wikiCol = collection(db, "wiki");

        let curTaskId = null, curWikiId = null, allTasks = [], allWiki = [], currentTagFilter = 'All';

        const applyTheme = (t) => { document.body.classList.toggle('dark-mode', t === 'dark'); localStorage.setItem('theme', t); };
        applyTheme(localStorage.getItem('theme') || 'light');
        document.getElementById('theme-toggle').onclick = () => applyTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark');

        window.wrap = (id, pre, suf) => {
            const ta = document.getElementById(id);
            const s = ta.selectionStart, e = ta.selectionEnd, v = ta.value;
            ta.value = v.substring(0, s) + pre + v.substring(s, e) + suf + v.substring(e);
            ta.dispatchEvent(new Event('input'));
        };

        window.fetchNews = async function() {
            const container = document.getElementById('news-container');
            container.innerHTML = '<p>Scanning subspace frequencies...</p>';
            try {
                const rssUrl = 'https://news.google.com/rss/search?q=when:24h+AP+News&hl=en-US&gl=US&ceid=US:en';
                const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(rssUrl)}`);
                const text = await response.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                const items = xml.querySelectorAll("item");
                container.innerHTML = '';
                items.forEach((item, i) => {
                    if (i >= 20) return;
                    const title = item.querySelector("title").textContent;
                    const desc = item.querySelector("description").textContent;
                    const link = item.querySelector("link").textContent;
                    
                    // IMPROVED IMAGE SCAN
                    let imgUrl = `https://images.unsplash.com/photo-1504711434969-e33886168f5c?auto=format&fit=crop&w=600&q=80&sig=${i}`;
                    const imgMatch = desc.match(/src="([^">]+)"/);
                    if (imgMatch && !imgMatch[1].includes('pixel')) imgUrl = imgMatch[1];

                    const card = document.createElement('div'); card.className = 'news-card';
                    card.innerHTML = `<img class="news-img" src="${imgUrl}"><div class="news-body"><div class="news-title">${title}</div><a href="${link}" target="_blank" style="color:var(--accent); font-size:11px; font-weight:bold; text-decoration:none; margin-top:10px; display:block;">Read More →</a></div>`;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = '<p style="color:red;">Interference detected. Re-sync array manually.</p>'; }
        }

        const showView = (view) => {
            [document.getElementById('kanban-view'), document.getElementById('wiki-content-view'), document.getElementById('news-view')].forEach(v => v.style.display = 'none');
            view.style.display = 'flex';
            if (view === document.getElementById('news-view')) fetchNews();
        };

        document.getElementById('nav-news-sidebar').onclick = () => showView(document.getElementById('news-view'));
        document.getElementById('nav-kanban').onclick = () => showView(document.getElementById('kanban-view'));
        document.getElementById('re-sync-btn').onclick = fetchNews;

        function setupToggle(prefix, notesEl, previewEl, toolbarId) {
            const btnP = document.getElementById(`${prefix}-mode-preview`), btnE = document.getElementById(`${prefix}-mode-edit`);
            btnP.onclick = () => { notesEl.style.display = 'none'; previewEl.style.display = 'block'; if(toolbarId) document.getElementById(toolbarId).style.display = 'none'; btnP.classList.add('active'); btnE.classList.remove('active'); previewEl.innerHTML = marked.parse(notesEl.value || ""); };
            btnE.onclick = () => { notesEl.style.display = 'block'; previewEl.style.display = 'none'; if(toolbarId) document.getElementById(toolbarId).style.display = 'flex'; btnE.classList.add('active'); btnP.classList.remove('active'); };
        }
        setupToggle('task', document.getElementById('modal-notes'), document.getElementById('modal-preview'));
        setupToggle('wiki', document.getElementById('wiki-notes'), document.getElementById('wiki-preview'), 'wiki-toolbar');

        function renderBoard() {
            ['todo-list', 'doing-list', 'done-list'].forEach(id => {
                const list = document.getElementById(id); list.innerHTML = '';
                const status = id.split('-')[0];
                allTasks.forEach(d => {
                    const t = d.data();
                    if (t.status === status && (currentTagFilter === 'All' || t.tag === currentTagFilter)) {
                        const card = document.createElement('div'); card.className = 'card'; card.setAttribute('data-id', d.id); card.innerText = t.text;
                        card.onclick = () => { curTaskId = d.id; document.getElementById('modal-title-display').value = t.text; document.getElementById('modal-notes').value = t.notes || ''; document.getElementById('task-mode-preview').click(); document.getElementById('editor-modal').style.display = 'flex'; };
                        list.appendChild(card);
                    }
                });
                new Sortable(list, { group: 'kanban', animation: 150, onEnd: (evt) => { const newStatus = evt.to.parentElement.getAttribute('data-status'); updateDoc(doc(db, 'tasks', evt.item.getAttribute('data-id')), { status: newStatus }); } });
            });
        }

        onSnapshot(wikiCol, (snap) => {
            const list = document.getElementById('wiki-nav-list'); list.innerHTML = '';
            snap.docs.forEach(d => {
                const item = document.createElement('div'); item.className = 'nav-item'; item.innerText = `📄 ${d.data().title}`;
                item.onclick = () => { curWikiId = d.id; showView(document.getElementById('wiki-content-view')); document.getElementById('wiki-title-display').value = d.data().title; document.getElementById('wiki-notes').value = d.data().content || ''; document.getElementById('wiki-mode-preview').click(); }; 
                list.appendChild(item);
            });
            allWiki = snap.docs;
        });

        onSnapshot(tasksCol, (snap) => { allTasks = snap.docs; renderBoard(); });

        onAuthStateChanged(auth, (u) => { if(u) { document.getElementById('login-screen').style.display = 'none'; document.getElementById('app-container').style.display = 'flex'; } });
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('add-wiki-btn').onclick = () => { const t = prompt("Title?"); if(t) addDoc(wikiCol, { title: t, content: '', lastEdited: serverTimestamp() }); };
        document.getElementById('add-btn').onclick = () => { const t = prompt("Task?"); if(t) addDoc(tasksCol, { text: t, status: 'todo' }); };
        document.getElementById('close-modal').onclick = () => document.getElementById('editor-modal').style.display = 'none';
    </script>
</body>
</html>
