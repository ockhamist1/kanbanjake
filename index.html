<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jake's Workspace</title>
    
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        :root { 
            --bg: #f7f7f5; --text: #37352f; --sidebar: #ebebec; --border: #e0e0e0; 
            --card-bg: #ffffff; --accent: #4338ca; --nav-hover: rgba(0,0,0,0.05);
        }
        body.dark-mode { 
            --bg: #121212; --text: #e0e0e0; --sidebar: #1e1e1e; --border: #333; 
            --card-bg: #1e1e1e; --accent: #818cf8; --nav-hover: rgba(255,255,255,0.05);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100vh; background-color: var(--bg); color: var(--text); overflow: hidden; display: flex; transition: background 0.3s; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border); width: 320px; }
        
        #sidebar { width: 260px; background-color: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; flex-shrink: 0; }
        .sidebar-section-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 5px; }
        .nav-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; display: flex; flex-direction: column; align-items: flex-start; gap: 2px; font-size: 14px; transition: 0.1s; }
        .nav-item:hover { background: var(--nav-hover); }
        .active-nav { background: var(--border) !important; font-weight: 600; }

        #main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        #kanban-view, #wiki-content-view, #news-view, #drudge-view { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; width: 100%; box-sizing: border-box; }

        /* --- TRIAGE NEWS GRID --- */
        .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; margin-top: 20px; }
        .news-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .news-card:hover { border-color: var(--accent); background: var(--nav-hover); transform: translateY(-2px); }
        .news-card.read { opacity: 0.45; filter: grayscale(1); order: 1; }
        .news-title { font-size: 14px; font-weight: 700; line-height: 1.4; color: var(--text); margin-bottom: 12px; }
        .news-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 10px; margin-top: auto; }
        .news-meta { font-size: 10px; font-weight: 600; text-transform: uppercase; color: #888; }
        
        .read-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: #888; cursor: pointer; }
        .read-toggle input { cursor: pointer; width: 16px; height: 16px; margin: 0; }

        /* --- KANBAN --- */
        .column { width: 300px; display: flex; flex-direction: column; margin-right: 20px; }
        .card-list { min-height: 300px; padding-bottom: 100px; }
        .card { background: var(--card-bg); padding: 16px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; cursor: grab; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-toggle { background: var(--sidebar); color: var(--text); }
        .btn-toggle.active { background: var(--accent); color: white; }

        @media (max-width: 768px) { #sidebar { display: none; } }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Jake's Workspace</h2>
            <p style="font-size: 14px; color: #888; margin-bottom: 20px;">Identity confirmation required.</p>
            <button id="login-btn" class="btn" style="background:var(--accent); color:white; padding: 12px 24px; width: 100%;">Sign in with Google</button>
        </div>
    </div>

    <div id="app-container" style="display:none; width: 100%;">
        <div id="sidebar">
            <div class="sidebar-section-label">Main</div>
            <div id="nav-kanban" class="nav-item active-nav">📊 Kanban Board</div>
            <div id="nav-news-sidebar" class="nav-item">📰 AP News Feed</div>
            <div id="nav-drudge-sidebar" class="nav-item">🚨 Drudge Report</div>
            <div class="sidebar-section-label">Wiki Library</div>
            <div id="wiki-nav-list" style="flex-grow: 1; overflow-y: auto;"></div>
            <button id="add-wiki-btn" class="btn" style="background:none; border: 1px dashed #888; color:#888; width:100%; margin-top:10px;">+ New Page</button>
            <div style="margin-top: 20px; display: flex; gap: 8px;">
                <button id="theme-toggle" class="btn" style="flex: 1; background: var(--border); color:var(--text);">🌙 Mode</button>
                <button id="logout-btn" class="btn" style="flex: 1; background: var(--border); color:var(--text);">🚪 Out</button>
            </div>
        </div>

        <div id="main-content">
            <div id="kanban-view">
                <div id="kanban-board" style="display:flex;">
                    <div class="column" data-status="todo">
                        <div class="column-header" style="font-weight:700; padding-bottom:15px; display:flex; justify-content:space-between; align-items:center;">To Do <button id="add-btn" class="btn" style="background:var(--accent); color:white; padding:4px 12px;">+ Add</button></div>
                        <div id="todo-list" class="card-list"></div>
                    </div>
                    <div class="column" data-status="doing"><div class="column-header" style="font-weight:700; padding-bottom:15px;">Doing</div><div id="doing-list" class="card-list"></div></div>
                    <div class="column" data-status="done"><div class="column-header" style="font-weight:700; padding-bottom:15px; display:flex; justify-content:space-between;">Done <button id="bulk-archive-btn" style="background:none; border:none; cursor:pointer;">🧹</button></div><div id="done-list" class="card-list"></div></div>
                </div>
            </div>

            <div id="news-view" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="margin:0">AP News: Quadrant Update</h2>
                    <button id="re-sync-ap" class="btn" style="background:var(--border); color:var(--text);">🔄 Re-Sync AP</button>
                </div>
                <div id="news-container" class="news-grid"><p>Establishing link...</p></div>
            </div>

            <div id="drudge-view" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2 style="margin:0">🚨 Drudge Report Array</h2>
                    <button id="re-sync-drudge" class="btn" style="background:var(--border); color:var(--text);">🔄 Re-Sync Drudge</button>
                </div>
                <div id="drudge-container" class="news-grid"><p>Scanning Drudge frequencies...</p></div>
            </div>

            <div id="wiki-content-view" style="display: none;">
                <div class="wiki-header" style="border-bottom:1px solid var(--border); padding-bottom:20px; margin-bottom:10px;">
                    <input type="text" id="wiki-title-display" style="font-size:28px; font-weight:800; border:none; background:transparent; outline:none; color:inherit; width:100%;" placeholder="Page Title">
                    <div style="margin-top:10px; display:flex; gap:12px; align-items:center;">
                        <button id="wiki-mode-preview" class="btn-toggle active">Preview</button>
                        <button id="wiki-mode-edit" class="btn-toggle">Edit</button>
                        <button id="wiki-export-pdf" style="background:var(--border); border:none; padding:6px 12px; border-radius:4px; font-size:12px; cursor:pointer;">🖨️ PDF</button>
                    </div>
                </div>
                <textarea id="wiki-notes" class="textarea" style="display:none; width:100%; min-height:500px; padding:15px; background:transparent; border:1px solid var(--border); color:inherit;"></textarea>
                <div id="wiki-preview" class="preview-area" style="overflow-y:auto;"></div>
            </div>
        </div>
    </div>

    <div id="editor-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:4000; justify-content:center; align-items:center; backdrop-filter:blur(2px);">
        <div class="modal-content" style="background:var(--card-bg); width:90%; max-width:750px; padding:30px; border-radius:12px; position:relative;">
            <button id="close-modal" style="position:absolute; top:20px; right:20px; background:none; border:none; font-size:24px; cursor:pointer; color:#888;">&times;</button>
            <input type="text" id="modal-title-display" style="font-size:22px; font-weight:800; border:none; background:transparent; outline:none; color:inherit; width:100%;">
            <div style="margin:15px 0; display:flex; gap:10px;">
                <button id="task-mode-preview" class="btn-toggle active">Preview</button>
                <button id="task-mode-edit" class="btn-toggle">Edit</button>
            </div>
            <textarea id="modal-notes" class="textarea" style="display:none; width:100%; min-height:300px; padding:15px; background:transparent; border:1px solid var(--border); color:inherit;"></textarea>
            <div id="modal-preview" class="preview-area"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyBrD9wri02pLZARr8BI600KTCbuIBTH1MI", authDomain: "kanbanjake.firebaseapp.com", projectId: "kanbanjake", storageBucket: "kanbanjake.firebasestorage.app", messagingSenderId: "207756213915", appId: "1:207756213915:web:2f546c9a9c7d28b189103e" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const tasksCol = collection(db, "tasks");
        const wikiCol = collection(db, "wiki");

        let curTaskId = null, curWikiId = null, allTasks = [], isEditing = false, sortables = [];

        // --- AUTH ---
        document.getElementById('login-btn').onclick = async () => { try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); } };
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        const applyTheme = (t) => { document.body.classList.toggle('dark-mode', t === 'dark'); localStorage.setItem('theme', t); };
        applyTheme(localStorage.getItem('theme') || 'light');
        document.getElementById('theme-toggle').onclick = () => applyTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark');

        const debounce = (f, w) => { let t; return (...a) => { clearTimeout(t); t = setTimeout(() => f.apply(this, a), w); }; };

        // --- RESILIENT NEWS HANDLER ---
        async function fetchSource(containerId, storageKey, rssUrl, sourceName) {
            const container = document.getElementById(containerId);
            container.innerHTML = `<p>Refreshing ${sourceName} array...</p>`;
            try {
                const readList = JSON.parse(localStorage.getItem(storageKey) || '[]');
                // Multiple proxy attempts for reliability
                const response = await fetch(`https://corsproxy.io/?${encodeURIComponent(rssUrl)}&cb=${Date.now()}`);
                const text = await response.text();
                const xml = new DOMParser().parseFromString(text, "text/xml");
                
                // Flexible selector to catch RSS (item) and Atom (entry)
                let items = Array.from(xml.querySelectorAll("item"));
                if (items.length === 0) items = Array.from(xml.querySelectorAll("entry"));

                if (items.length === 0) throw new Error("Empty Feed");

                items.sort((a, b) => {
                    const linkA = (a.querySelector("link")?.textContent || a.querySelector("link")?.getAttribute("href") || "");
                    const linkB = (b.querySelector("link")?.textContent || b.querySelector("link")?.getAttribute("href") || "");
                    const readA = readList.includes(linkA);
                    const readB = readList.includes(linkB);
                    return (readA === readB) ? 0 : readA ? 1 : -1;
                });

                container.innerHTML = '';
                items.forEach((item, i) => {
                    if (i >= 24) return;
                    const title = item.querySelector("title")?.textContent || "Breaking Signal...";
                    const link = item.querySelector("link")?.textContent || item.querySelector("link")?.getAttribute("href") || "#";
                    const isRead = readList.includes(link);

                    const card = document.createElement('div'); 
                    card.className = `news-card ${isRead ? 'read' : ''}`;
                    card.style.order = isRead ? "1" : "0";
                    card.innerHTML = `
                        <div class="news-title">${title}</div>
                        <div class="news-footer">
                            <div class="news-meta">${sourceName}</div>
                            <label class="read-toggle">
                                <input type="checkbox" ${isRead ? 'checked' : ''}> Mark Read
                            </label>
                        </div>
                    `;
                    
                    card.onclick = () => { toggleRead(link, true, card, storageKey); window.open(link, '_blank'); };
                    const checkbox = card.querySelector('input');
                    checkbox.onclick = (e) => { e.stopPropagation(); toggleRead(link, checkbox.checked, card, storageKey); };
                    container.appendChild(card);
                });
            } catch (e) { 
                container.innerHTML = `<p style="color:red;">Interference in ${sourceName} signal. Manual re-sync recommended.</p>`; 
            }
        }

        function toggleRead(link, shouldBeRead, cardElement, storageKey) {
            let currentReads = JSON.parse(localStorage.getItem(storageKey) || '[]');
            if (shouldBeRead && !currentReads.includes(link)) { currentReads.push(link); cardElement.classList.add('read'); cardElement.style.order = "1"; }
            else if (!shouldBeRead) { currentReads = currentReads.filter(r => r !== link); cardElement.classList.remove('read'); cardElement.style.order = "0"; }
            localStorage.setItem(storageKey, JSON.stringify(currentReads));
        }

        const fetchAP = () => fetchSource('news-container', 'readArticlesAP', 'https://news.google.com/rss/search?q=when:24h+AP+News&hl=en-US&gl=US&ceid=US:en', 'AP NEWS');
        const fetchDrudge = () => fetchSource('drudge-container', 'readArticlesDrudge', 'https://feeds.feedburner.com/drudge-report-feed', 'DRUDGE REPORT');

        const showView = (v) => { 
            [document.getElementById('kanban-view'), document.getElementById('wiki-content-view'), document.getElementById('news-view'), document.getElementById('drudge-view')].forEach(div => div.style.display = 'none');
            v.style.display = 'flex'; 
            if (v === document.getElementById('news-view')) fetchAP();
            if (v === document.getElementById('drudge-view')) fetchDrudge();
        };

        document.getElementById('nav-news-sidebar').onclick = () => showView(document.getElementById('news-view'));
        document.getElementById('nav-drudge-sidebar').onclick = () => showView(document.getElementById('drudge-view'));
        document.getElementById('nav-kanban').onclick = () => showView(document.getElementById('kanban-view'));
        document.getElementById('re-sync-ap').onclick = fetchAP;
        document.getElementById('re-sync-drudge').onclick = fetchDrudge;

        // --- BOARD LOGIC ---
        function initSortable() {
            sortables.forEach(s => s.destroy());
            sortables = ['todo-list', 'doing-list', 'done-list'].map(id => new Sortable(document.getElementById(id), { group: 'kanban', animation: 150, onEnd: (evt) => {
                updateDoc(doc(db, 'tasks', evt.item.getAttribute('data-id')), { status: evt.to.parentElement.getAttribute('data-status') });
            }}));
        }

        function renderBoard() {
            if (isEditing) return;
            ['todo-list', 'doing-list', 'done-list'].forEach(id => {
                const list = document.getElementById(id); list.innerHTML = '';
                const status = id.split('-')[0];
                allTasks.forEach(d => {
                    const t = d.data();
                    if (t.status === status) {
                        const card = document.createElement('div'); card.className = 'card'; card.setAttribute('data-id', d.id); card.innerText = t.text;
                        card.onclick = () => { curTaskId = d.id; isEditing = true; document.getElementById('modal-title-display').value = t.text; document.getElementById('modal-notes').value = t.notes || ''; document.getElementById('task-mode-preview').click(); document.getElementById('editor-modal').style.display = 'flex'; };
                        list.appendChild(card);
                    }
                });
            });
            initSortable();
        }

        onSnapshot(wikiCol, (snap) => {
            const list = document.getElementById('wiki-nav-list'); list.innerHTML = '';
            snap.docs.forEach(d => {
                const item = document.createElement('div'); item.className = 'nav-item'; item.innerText = `📄 ${d.data().title}`;
                item.onclick = () => { curWikiId = d.id; isEditing = false; showView(document.getElementById('wiki-content-view')); document.getElementById('wiki-title-display').value = d.data().title; document.getElementById('wiki-notes').value = d.data().content || ''; document.getElementById('wiki-mode-preview').click(); }; 
                list.appendChild(item);
            });
        });

        onSnapshot(tasksCol, (snap) => { allTasks = snap.docs; renderBoard(); });
        onAuthStateChanged(auth, (u) => { document.getElementById('login-screen').style.display = u ? 'none' : 'flex'; document.getElementById('app-container').style.display = u ? 'flex' : 'none'; });

        document.getElementById('add-wiki-btn').onclick = () => { const t = prompt("Title?"); if(t) addDoc(wikiCol, { title: t, content: '', lastEdited: serverTimestamp() }); };
        document.getElementById('add-btn').onclick = () => { const t = prompt("Task?"); if(t) addDoc(tasksCol, { text: t, status: 'todo' }); };
        document.getElementById('close-modal').onclick = () => { document.getElementById('editor-modal').style.display = 'none'; isEditing = false; };
    </script>
</body>
</html>
