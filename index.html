<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jake's Workspace</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        /* --- DYNAMIC THEMING --- */
        :root { 
            --bg: #f7f7f5; --text: #37352f; --sidebar: #ebebec; --border: #e0e0e0; 
            --card-bg: #ffffff; --accent: #37352f; --nav-hover: rgba(0,0,0,0.05);
        }
        body.dark-mode { 
            --bg: #121212; --text: #e0e0e0; --sidebar: #1e1e1e; --border: #333; 
            --card-bg: #1e1e1e; --accent: #5c5c5c; --nav-hover: rgba(255,255,255,0.05);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100vh; background-color: var(--bg); color: var(--text); overflow: hidden; display: flex; transition: background 0.3s; }
        
        #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; border: 1px solid var(--border); }
        
        /* --- SIDEBAR (Desktop Only) --- */
        #sidebar { width: 260px; background-color: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .sidebar-section-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 10px 5px; }
        .nav-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; display: flex; align-items: center; gap: 10px; font-size: 14px; }
        .nav-item:hover { background: var(--nav-hover); }
        .active-nav { background: var(--border) !important; font-weight: 600; }

        /* --- MOBILE VIEW SWITCHER --- */
        #mobile-switcher { display: none; position: fixed; bottom: 0; width: 100%; background: var(--sidebar); border-top: 1px solid var(--border); height: 65px; z-index: 2000; justify-content: space-around; align-items: center; }
        .switch-btn { background: none; border: none; color: var(--text); display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: bold; opacity: 0.6; }
        .switch-btn.active { opacity: 1; color: #4338ca; }

        /* --- CONTENT AREAS --- */
        #main-content { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        #kanban-view, #wiki-view { padding: 30px; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }

        /* --- KANBAN BOARD --- */
        #kanban-board { display: flex; gap: 20px; flex-grow: 1; }
        .column { min-width: 300px; width: 300px; display: flex; flex-direction: column; height: 100%; }
        .column-header { font-weight: 700; padding-bottom: 15px; display: flex; justify-content: space-between; font-size: 15px; }
        .card-list { flex-grow: 1; padding: 5px; min-height: 150px; }
        
        .card { background: var(--card-bg); padding: 16px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; cursor: grab; position: relative; touch-action: none; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .handle { color: #ccc; margin-right: 10px; cursor: grab; font-size: 18px; }
        
        /* --- COUNTDOWN BADGE --- */
        .countdown { font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 4px; margin-top: 8px; display: inline-block; }
        .overdue { background: #fee2e2; color: #ef4444; }
        .soon { background: #ffedd5; color: #f59e0b; }
        .later { background: #f3f4f6; color: #6b7280; }

        /* --- MODALS --- */
        #editor-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 4000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-content { background: var(--card-bg); width: 90%; max-width: 750px; height: 85vh; border-radius: 12px; padding: 30px; display: flex; flex-direction: column; position: relative; }
        
        .title-input { font-size: 26px; font-weight: 800; border: none; background: transparent; width: 100%; outline: none; color: inherit; }
        .textarea { flex-grow: 1; width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: inherit; font-size: 16px; margin-top: 15px; background: rgba(0,0,0,0.02); color: inherit; resize: none; outline: none; }
        .preview-area { flex-grow: 1; overflow-y: auto; padding: 15px; border: 1px solid var(--border); border-radius: 8px; margin-top: 15px; line-height: 1.6; }

        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; }
        .btn-toggle { background: var(--sidebar); color: var(--text); margin-right: 5px; }
        .btn-toggle.active { background: #4338ca; color: white; }
        .btn-save { background: var(--text); color: var(--bg); }
        .btn-delete { color: #ff4d4f; background: transparent; border: 1px solid #ff4d4f; }

        /* --- MOBILE RE-DESIGN --- */
        @media (max-width: 768px) {
            #sidebar { display: none; }
            #mobile-header { display: flex; background: var(--sidebar); padding: 15px; border-bottom: 1px solid var(--border); font-weight: bold; justify-content: center; }
            #mobile-switcher { display: flex; }
            #main-content { padding-bottom: 65px; }
            #kanban-board { overflow-x: auto; scroll-snap-type: x mandatory; padding: 10px; gap: 15px; }
            .column { min-width: 88vw; scroll-snap-align: center; }
            #kanban-view, #wiki-view { padding: 15px; }
            .modal-content { height: 92vh; padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>Jake's Workspace</h2>
            <button id="login-btn" class="btn btn-save" style="width:100%; margin-top:10px;">Sign in with Google</button>
        </div>
    </div>

    <div id="mobile-switcher">
        <button id="switch-tasks" class="switch-btn active">
            <span style="font-size: 20px;">📊</span>
            <span>TASKS</span>
        </button>
        <button id="switch-wiki" class="switch-btn">
            <span style="font-size: 20px;">📄</span>
            <span>WIKI</span>
        </button>
        <button id="mobile-theme-toggle" class="switch-btn">
            <span id="theme-icon" style="font-size: 20px;">🌙</span>
            <span>THEME</span>
        </button>
    </div>

    <div id="app-container" style="display:none; width: 100%;">
        <div id="sidebar">
            <div class="sidebar-section-label">Main</div>
            <div id="nav-kanban" class="nav-item active-nav">📊 Kanban Board</div>
            
            <div class="sidebar-section-label">Wiki Pages</div>
            <div id="wiki-list" style="flex-grow: 1; overflow-y: auto;"></div>
            
            <button id="add-wiki-btn" class="btn" style="background:none; border: 1px dashed #888; color: #888; width: 100%; margin-top: 10px;">+ New Page</button>
            
            <div style="margin-top: 20px; display: flex; gap: 8px;">
                <button id="theme-toggle" class="btn" style="flex: 1; background: var(--border); color: var(--text);">🌙 Mode</button>
                <button id="logout-btn" class="btn" style="flex: 1; background: var(--border); color: var(--text);">🚪 Out</button>
            </div>
        </div>

        <div id="main-content">
            <div id="kanban-view">
                <div id="kanban-board">
                    <div class="column" data-status="todo">
                        <div class="column-header">To Do <button id="add-btn" class="btn btn-save" style="padding: 2px 10px;">+ Add</button></div>
                        <div class="card-list" id="todo-list"></div>
                    </div>
                    <div class="column" data-status="doing">
                        <div class="column-header">Doing</div>
                        <div class="card-list" id="doing-list"></div>
                    </div>
                    <div class="column" data-status="done">
                        <div class="column-header">Done</div>
                        <div class="card-list" id="done-list"></div>
                    </div>
                </div>
            </div>

            <div id="wiki-view" style="display: none;">
                <input type="text" id="wiki-title-display" class="title-input">
                <div style="margin-top: 10px;">
                    <button id="wiki-mode-preview" class="btn btn-toggle active">Preview</button>
                    <button id="wiki-mode-edit" class="btn btn-toggle">Edit</button>
                </div>
                <textarea id="wiki-notes" class="textarea" style="display:none;"></textarea>
                <div id="wiki-preview" class="preview-area"></div>
                <div style="margin-top: 20px; display: flex; justify-content: space-between;">
                    <button id="delete-wiki-btn" class="btn btn-delete">Delete Page</button>
                    <button id="wiki-save-btn" class="btn btn-save">Save Page</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editor-modal">
        <div class="modal-content">
            <button id="close-modal" style="background: none; border: none; font-size: 28px; color: #888; cursor: pointer; position: absolute; right: 20px; top: 20px;">&times;</button>
            
            <input type="text" id="modal-title-display" class="title-input">
            
            <div style="display: flex; gap: 15px; align-items: center; margin-top: 10px;">
                <div style="font-size: 12px; font-weight: bold;">📅 Due Date:</div>
                <input type="date" id="task-due-date" style="border: 1px solid var(--border); border-radius: 4px; padding: 4px; background: transparent; color: inherit;">
            </div>

            <div style="margin-top: 15px;">
                <button id="task-mode-preview" class="btn btn-toggle active">Preview</button>
                <button id="task-mode-edit" class="btn btn-toggle">Edit</button>
            </div>

            <textarea id="modal-notes" class="textarea" style="display:none;"></textarea>
            <div id="modal-preview" class="preview-area"></div>
            
            <div style="margin-top: 25px; display: flex; justify-content: space-between;">
                <button id="delete-task-btn" class="btn btn-delete">Delete Task</button>
                <button id="save-notes" class="btn btn-save">Save Task</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrD9wri02pLZARr8BI600KTCbuIBTH1MI",
            authDomain: "kanbanjake.firebaseapp.com",
            projectId: "kanbanjake",
            storageBucket: "kanbanjake.firebasestorage.app",
            messagingSenderId: "207756213915",
            appId: "1:207756213915:web:2f546c9a9c7d28b189103e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const tasksCol = collection(db, "tasks");
        const wikiCol = collection(db, "wiki");

        // --- THEME ---
        const themeToggle = document.getElementById('theme-toggle');
        const mobileThemeToggle = document.getElementById('mobile-theme-toggle');
        const applyTheme = (t) => {
            if (t === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('theme-icon').innerText = '☀️';
            } else {
                document.body.classList.remove('dark-mode');
                document.getElementById('theme-icon').innerText = '🌙';
            }
            localStorage.setItem('theme', t);
        };
        applyTheme(localStorage.getItem('theme') || 'light');
        themeToggle.onclick = mobileThemeToggle.onclick = () => applyTheme(document.body.classList.contains('dark-mode') ? 'light' : 'dark');

        // --- AUTH ---
        let curTaskId = null, curWikiId = null;
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-container').style.display = 'flex';
                startApp();
            } else {
                document.getElementById('login-screen').style.display = 'flex';
                document.getElementById('app-container').style.display = 'none';
            }
        });
        document.getElementById('login-btn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // --- MOBILE SWITCHER ---
        const taskBtn = document.getElementById('switch-tasks');
        const wikiBtn = document.getElementById('switch-wiki');
        const kanbanView = document.getElementById('kanban-view');
        const wikiView = document.getElementById('wiki-view');

        taskBtn.onclick = () => {
            kanbanView.style.display = 'flex'; wikiView.style.display = 'none';
            taskBtn.classList.add('active'); wikiBtn.classList.remove('active');
        };
        wikiBtn.onclick = () => {
            kanbanView.style.display = 'none'; wikiView.style.display = 'flex';
            wikiBtn.classList.add('active'); taskBtn.classList.remove('active');
            if(!curWikiId && document.querySelector('.wiki-item')) document.querySelector('.wiki-item').click();
        };

        function calculateCountdown(dateStr) {
            if (!dateStr) return null;
            const now = new Date();
            const due = new Date(dateStr + "T23:59:59");
            const diff = Math.ceil((due - now) / (1000 * 60 * 60 * 24));
            
            if (diff < 0) return { text: "OVERDUE", class: "overdue" };
            if (diff === 0) return { text: "DUE TODAY", class: "overdue" };
            if (diff <= 3) return { text: `${diff} DAYS LEFT`, class: "soon" };
            return { text: `${diff} DAYS LEFT`, class: "later" };
        }

        function startApp() {
            // DRAG AND DROP
            ['todo-list', 'doing-list', 'done-list'].forEach(id => {
                new Sortable(document.getElementById(id), {
                    group: 'kanban', animation: 150, delay: 300, delayOnTouchOnly: true,
                    forceFallback: true, fallbackOnBody: true,
                    onEnd: (evt) => {
                        const newStatus = evt.to.parentElement.getAttribute('data-status');
                        const taskId = evt.item.getAttribute('data-id');
                        if (taskId) updateDoc(doc(db, 'tasks', taskId), { status: newStatus });
                    }
                });
            });

            onSnapshot(tasksCol, (snap) => {
                ['todo-list', 'doing-list', 'done-list'].forEach(id => document.getElementById(id).innerHTML = '');
                snap.forEach(d => {
                    const t = d.data();
                    const card = document.createElement('div');
                    card.className = 'card'; card.setAttribute('data-id', d.id);
                    
                    const cd = calculateCountdown(t.dueDate);
                    const countdownHtml = cd ? `<div class="countdown ${cd.class}">${cd.text}</div>` : '';
                    
                    card.innerHTML = `<span class="handle">⠿</span> ${t.text} ${countdownHtml}`;
                    card.onclick = (e) => { if(e.target.className !== 'handle') openTask(d.id, t); };
                    document.getElementById(`${t.status}-list`).appendChild(card);
                });
            });

            onSnapshot(wikiCol, (snap) => {
                const list = document.getElementById('wiki-list');
                list.innerHTML = '';
                snap.forEach(d => {
                    const p = d.data();
                    const item = document.createElement('div');
                    item.className = 'nav-item wiki-item'; item.innerText = `📄 ${p.title}`;
                    item.onclick = () => {
                        curWikiId = d.id;
                        openWiki(p);
                        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
                        item.classList.add('active-nav');
                    };
                    list.appendChild(item);
                });
            });
        }

        // PREVIEW / EDIT TOGGLES
        const setupToggle = (prefix, notesEl, previewEl) => {
            const btnP = document.getElementById(`${prefix}-mode-preview`);
            const btnE = document.getElementById(`${prefix}-mode-edit`);
            btnP.onclick = () => {
                notesEl.style.display = 'none'; previewEl.style.display = 'block';
                btnP.classList.add('active'); btnE.classList.remove('active');
                previewEl.innerHTML = marked.parse(notesEl.value);
            };
            btnE.onclick = () => {
                notesEl.style.display = 'block'; previewEl.style.display = 'none';
                btnE.classList.add('active'); btnP.classList.remove('active');
            };
        };

        setupToggle('task', document.getElementById('modal-notes'), document.getElementById('modal-preview'));
        setupToggle('wiki', document.getElementById('wiki-notes'), document.getElementById('wiki-preview'));

        function openTask(id, t) {
            curTaskId = id;
            document.getElementById('modal-title-display').value = t.text;
            document.getElementById('task-due-date').value = t.dueDate || '';
            document.getElementById('modal-notes').value = t.notes || '';
            document.getElementById('task-mode-preview').click(); // Default to Preview
            document.getElementById('editor-modal').style.display = 'flex';
        }

        function openWiki(p) {
            document.getElementById('kanban-view').style.display = 'none';
            document.getElementById('wiki-view').style.display = 'flex';
            wikiBtn.classList.add('active'); taskBtn.classList.remove('active');
            document.getElementById('wiki-title-display').value = p.title;
            document.getElementById('wiki-notes').value = p.content || '';
            document.getElementById('wiki-mode-preview').click(); // Default to Preview
        }

        document.getElementById('nav-kanban').onclick = taskBtn.onclick;

        document.getElementById('save-notes').onclick = () => {
            updateDoc(doc(db, 'tasks', curTaskId), { 
                text: document.getElementById('modal-title-display').value,
                notes: document.getElementById('modal-notes').value,
                dueDate: document.getElementById('task-due-date').value
            });
            document.getElementById('editor-modal').style.display = 'none';
        };

        document.getElementById('wiki-save-btn').onclick = async () => {
            await updateDoc(doc(db, 'wiki', curWikiId), { 
                title: document.getElementById('wiki-title-display').value,
                content: document.getElementById('wiki-notes').value
            });
            alert("Saved!");
        };

        document.getElementById('add-btn').onclick = () => {
            const t = prompt("Task Name?");
            if(t) addDoc(tasksCol, { text: t, status: 'todo', tag: 'General', notes: '' });
        };

        document.getElementById('add-wiki-btn').onclick = () => {
            const t = prompt("Page Title?");
            if(t) addDoc(wikiCol, { title: t, content: '' });
        };

        document.getElementById('delete-task-btn').onclick = () => {
            if(confirm("Delete?")) { deleteDoc(doc(db, 'tasks', curTaskId)); document.getElementById('editor-modal').style.display = 'none'; }
        };

        document.getElementById('delete-wiki-btn').onclick = () => {
            if(confirm("Delete?")) { deleteDoc(doc(db, 'wiki', curWikiId)); taskBtn.click(); }
        };

        document.getElementById('close-modal').onclick = () => document.getElementById('editor-modal').style.display = 'none';
    </script>
</body>
</html>
